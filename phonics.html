<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=yes">
<title>小学英语拼读 · 音标学习</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
       background: #f5f5f7; color: #1d1d1f; -webkit-text-size-adjust: 100%; padding-bottom: 80px; }
header { background: linear-gradient(135deg, #ff9500, #ff6b6b); color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 10; }
header h1 { margin: 0; font-size: 18px; }
header .sub { font-size: 12px; opacity: 0.9; margin-top: 2px; }
.tabs { display: flex; background: #fff; border-bottom: 1px solid #e5e5e7; position: sticky; top: 56px; z-index: 9; }
.tab { flex: 1; padding: 12px 4px; text-align: center; border: none; background: none; cursor: pointer; font-size: 13px; color: #555; }
.tab.active { color: #ff6b6b; border-bottom: 2px solid #ff6b6b; font-weight: 600; }
main { max-width: 900px; margin: 0 auto; padding: 12px; }
.panel { display: none; }
.panel.active { display: block; }

.card { background: #fff; border-radius: 12px; padding: 14px; margin: 8px 0; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
.card h3 { margin: 0 0 6px; font-size: 16px; }
.section-title { font-size: 17px; font-weight: 700; margin: 16px 0 8px; color: #ff6b6b; }

/* Phonetics */
.phon-group { margin-bottom: 16px; }
.phon-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; }
.phon-card { background: #fff; border-radius: 10px; padding: 12px 8px; text-align: center; cursor: pointer; transition: transform .1s; }
.phon-card:active { transform: scale(0.96); }
.phon-symbol { font-size: 24px; font-weight: 700; color: #ff6b6b; }
.phon-type { font-size: 10px; color: #888; margin-top: 2px; }
.phon-detail { background: #fff; border-radius: 12px; padding: 16px; margin: 8px 0; }
.phon-detail .big { font-size: 40px; text-align: center; color: #ff6b6b; font-weight: 700; padding: 12px; background: #fff5f5; border-radius: 12px; }
.phon-detail .label { font-size: 12px; color: #888; margin-top: 10px; margin-bottom: 4px; }
.phon-detail .content { font-size: 14px; line-height: 1.6; }
.phon-detail .examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.phon-detail .ex { background: #f0f5ff; padding: 4px 10px; border-radius: 12px; font-size: 13px; cursor: pointer; }
.phon-detail .ex:active { background: #d0e0ff; }

/* Phonics */
.phonics-card { background: #fff; border-radius: 12px; padding: 14px; margin: 8px 0; }
.phonics-pattern { font-size: 22px; font-weight: 700; color: #0071e3; display: inline-block; min-width: 60px; }
.phonics-sound { font-size: 14px; color: #ff6b6b; margin-left: 8px; }
.phonics-rule { font-size: 13px; color: #555; margin-top: 6px; line-height: 1.5; }
.phonics-examples { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.phonics-ex { background: #f5f5f7; padding: 4px 10px; border-radius: 12px; font-size: 13px; cursor: pointer; }
.phonics-ex:active { background: #e5e5e7; }

/* Words */
.word-filters { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
.filter-btn { padding: 6px 14px; border-radius: 999px; border: 1px solid #d2d2d7; background: #fff; cursor: pointer; font-size: 12px; }
.filter-btn.active { background: #ff6b6b; color: #fff; border-color: #ff6b6b; }
.word-card { background: #fff; border-radius: 12px; padding: 14px; margin: 8px 0; }
.word-head { display: flex; align-items: center; gap: 12px; }
.word-big { font-size: 24px; font-weight: 700; }
.word-phon { font-size: 14px; color: #ff6b6b; }
.word-zh { font-size: 13px; color: #555; margin-left: auto; }
.word-break { font-size: 13px; color: #888; margin-top: 8px; }
.word-break .phoneme { display: inline-block; background: #fff5f5; color: #ff6b6b; padding: 2px 8px; border-radius: 6px; margin: 0 2px; cursor: pointer; font-weight: 600; }
.word-sentence { font-size: 13px; color: #555; margin-top: 8px; padding: 8px; background: #f9f9fb; border-radius: 8px; cursor: pointer; }

/* Sentences */
.sent-card { background: #fff; border-radius: 12px; padding: 14px; margin: 8px 0; }
.sent-en { font-size: 17px; font-weight: 600; cursor: pointer; }
.sent-zh { font-size: 13px; color: #555; margin-top: 4px; }
.sent-words { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
.sent-word { background: #f0f5ff; padding: 3px 8px; border-radius: 8px; font-size: 12px; cursor: pointer; }
.sent-word:active { background: #d0e0ff; }
.sent-tip { font-size: 12px; color: #888; margin-top: 8px; padding: 6px 10px; background: #fff8e1; border-radius: 6px; line-height: 1.5; }

/* Controls */
.controls { position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%); background: #1d1d1f; color: #fff; padding: 10px 16px; border-radius: 999px; box-shadow: 0 4px 12px rgba(0,0,0,.2); display: flex; gap: 10px; align-items: center; font-size: 13px; z-index: 20; }
.controls input[type=range] { width: 80px; }
.controls button { background: rgba(255,255,255,0.2); border: none; color: #fff; padding: 6px 12px; border-radius: 999px; font-size: 12px; cursor: pointer; }

.hidden { display: none !important; }
.back-btn { background: none; border: none; color: #ff6b6b; font-size: 14px; padding: 8px 0; cursor: pointer; margin-bottom: 8px; }
</style>
</head>
<body>
<header>
  <h1>📖 小学英语拼读</h1>
  <div class="sub" id="header-sub">音标 · 自然拼读 · 单词 · 句子</div>
</header>
<div class="tabs">
  <button class="tab active" data-tab="phonetics">音标</button>
  <button class="tab" data-tab="phonics">自然拼读</button>
  <button class="tab" data-tab="words">单词</button>
  <button class="tab" data-tab="sentences">句子</button>
</div>
<main id="app"></main>

<div class="controls">
  <span>语速</span>
  <input type="range" id="rate" min="0.5" max="1.2" step="0.1" value="0.8">
  <span id="rate-val">0.8x</span>
</div>

<script>

"word": "teacher", "phon": "/ˈtiːtʃə/", "zh": "老师"}]}, {"symbol": "/iː/", "type": "长元音", "mouth": "嘴巴微微张开，嘴角向两边拉，像在微笑；舌头前部抬高，靠近上牙龈，像小兔子竖起耳朵。", "tip": "发音时要拉长声音，保持嘴型稳定，不要滑动。", "letter_patterns": "ee, ea, ie, e_e", "examples": [{"word": "see", "phon": "/siː/", "zh": "看见"}, {"word": "tea", "phon": "/tiː/", "zh": "茶"}, {"word": "she", "phon": "/ʃiː/", "zh": "她"}]}, {"symbol": "/ɜː/", "type": "长元音", "mouth": "嘴巴自然张开，嘴唇放松不圆，像打哈欠但不张太大；舌头中部微微抬起，像小猫咪轻轻叫‘嗯’。", "tip": "发音时舌位居中，声音平稳拉长，别太用力。", "letter_patterns": "ir, er, ur, ear", "examples": [{"word": "bird", "phon": "/bɜːd/", "zh": "鸟"}, {"word": "her", "phon": "/hɜː/", "zh": "她"}, {"word": "nurse", "phon": "/nɜːs/", "zh": "护士"}]}, {"symbol": "/ɑː/", "type": "长元音", "mouth": "嘴巴张大，像打哈欠或医生检查喉咙；舌头平放，后部稍抬，像在喊‘啊——’。", "tip": "声音从喉咙深处发出，拉长且饱满，别收太快。", "letter_patterns": "ar, a, al", "examples": [{"word": "car", "phon": "/kɑː/", "zh": "汽车"}, {"word": "father", "phon": "/ˈfɑːðə/", "zh": "爸爸"}, {"word": "calm", "phon": "/kɑːm/", "zh": "平静"}]}, {"symbol": "/ɔː/", "type": "长元音", "mouth": "嘴巴张开，嘴唇圆成小O形，像吹蜡烛前的准备；舌头后部抬高，像在说‘哦——’。", "tip": "嘴唇要圆，声音拉长，别变成短音或滑音。", "letter_patterns": "or, aw, al, oar", "examples": [{"word": "for", "phon": "/fɔː/", "zh": "为了"}, {"word": "law", "phon": "/lɔː/", "zh": "法律"}, {"word": "door", "phon": "/dɔː/", "zh": "门"}]}, {"symbol": "/uː/", "type": "长元音", "mouth": "嘴唇向前突出，圆成小鱼嘴；舌头后部抬高，像在说‘呜——’，下巴微收。", "tip": "嘴唇一定要圆紧，声音拉长，别松垮或变音。", "letter_patterns": "oo, ou, u_e, ew", "examples": [{"word": "food", "phon": "/fuːd/", "zh": "食物"}, {"word": "blue", "phon": "/bluː/", "zh": "蓝色"}, {"word": "rule", "phon": "/ruːl/", "zh": "规则"}]}, {"symbol": "/eɪ/", "type": "双元音", "mouth": "嘴巴从微笑慢慢张开，像在说‘哎’然后拉长成‘诶’。舌头从高处滑向中间。", "tip": "先发/e/再滑到/ɪ/，像唱歌一样连贯。", "letter_patterns": "a_e, ay, ai", "examples": [{"word": "cake", "phon": "/keɪk/", "zh": "蛋糕"}, {"word": "play", "phon": "/pleɪ/", "zh": "玩"}, {"word": "rain", "phon": "/reɪn/", "zh": "雨"}]}, {"symbol": "/aɪ/", "type": "双元音", "mouth": "嘴巴从大张变成微笑，像惊讶时喊‘啊’然后收成‘伊’。舌头从低处滑到高处。", "tip": "开头 const app = document.getElementById('app');
let state = { tab: 'phonetics', rate: 0.8, selectedPhon: null, wordLevel: 0, sentTheme: null };
const progress = JSON.parse(localStorage.getItem('phonics_progress') || '{"learned":[]}');
const saveProgress = () => localStorage.setItem('phonics_progress', JSON.stringify(progress));

function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// TTS
let utter;
function speak(text, opts={}, cb) {
  if (!('speechSynthesis' in window)) { alert('浏览器不支持语音'); return; }
  speechSynthesis.cancel();
  utter = new SpeechSynthesisUtterance(text);
  utter.lang = opts.lang || 'en-US';
  utter.rate = opts.rate || state.rate;
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  if (voices.length) utter.voice = voices[0];
  if (cb) utter.onend = cb;
  speechSynthesis.speak(utter);
}
function speakSlow(text) { speak(text, { rate: state.rate }); }

// Tab switching
document.querySelectorAll('.tab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b === btn));
    state.tab = btn.dataset.tab;
    render();
    window.scrollTo(0, 0);
  };
});

document.getElementById('rate').oninput = e => {
  state.rate = parseFloat(e.target.value);
  document.getElementById('rate-val').textContent = state.rate + 'x';
};

function render() {
  if (state.tab === 'phonetics') renderPhonetics();
  else if (state.tab === 'phonics') renderPhonicsRules();
  else if (state.tab === 'words') renderWords();
  else if (state.tab === 'sentences') renderSentences();
}

// ===== Phonetics =====
function renderPhonetics() {
  const groups = {};
  DATA.phonetics.forEach(p => {
    if (!groups[p.type]) groups[p.type] = [];
    groups[p.type].push(p);
  });
  const order = ['短元音', '长元音', '双元音', '清辅音', '浊辅音'];
  let html = '<div class="section-title">🎵 48 个音标 · 点击发音</div>';
  order.forEach(type => {
    if (!groups[type]) return;
    html += `<div class="phon-group"><div style="font-size:14px;color:#555;margin-bottom:6px">${type} (${groups[type].length})</div><div class="phon-grid">`;
    groups[type].forEach((p, i) => {
      const idx = DATA.phonetics.indexOf(p);
      const learned = progress.learned.includes('phon_' + idx);
      html += `<div class="phon-card" onclick="selectPhon(${idx})">
        <div class="phon-symbol">${p.symbol}</div>
        <div class="phon-type">${learned ? '✓ ' : ''}${p.type}</div>
      </div>`;
    });
    html += '</div></div>';
  });
  app.innerHTML = html;
}

// Play phonetic audio (embedded mp3)
function playPhoneticAudio(symbol) {
  if (DATA.audio && DATA.audio[symbol]) {
    const audio = new Audio(DATA.audio[symbol]);
    audio.play();
    return true;
  }
  return false;
}

function selectPhon(idx) {
  const p = DATA.phonetics[idx];
  const refWord = (DATA.audio_words && DATA.audio_words[p.symbol]) || '';
  let html = `<button class="back-btn" onclick="render()">← 返回音标列表</button>
    <div class="phon-detail">
      <div class="big">${p.symbol}</div>
      ${refWord ? `<div style="text-align:center;margin-top:10px"><button class="primary" style="background:#ff6b6b" onclick="playPhoneticAudio('${p.symbol.replace(/'/g,"\'")}')">🔊 听参考词发音 (${refWord})</button></div>` : ''}
      <div class="label">类型</div><div class="content">${p.type}</div>
      <div class="label">👄 口型</div><div class="content">${escapeHtml(p.mouth)}</div>
      <div class="label">💡 发音要领</div><div class="content">${escapeHtml(p.tip)}</div>
      <div class="label">🔤 常见字母组合</div><div class="content" style="color:#0071e3;font-weight:600">${escapeHtml(p.letter_patterns)}</div>
      <div class="label">📖 例词(点击朗读)</div>
      <div class="examples">$${p.examples.map(ex => `<span class="ex" onclick="speak('${ex.word.replace(/'/g,"\\'")}')">${ex.word} ${ex.phon} ${ex.zh}</span>`).join('')}</div>
      <button class="back-btn" style="margin-top:12px;color:#34c759" onclick="markLearned('phon_'+${idx})">${progress.learned.includes('phon_'+idx) ? '✓ 已学会' : '标记为已学会'}</button>
    </div>`;
  app.innerHTML = html;
  window.scrollTo(0, 0);
}

function markLearned(key) {
  const i = progress.learned.indexOf(key);
  if (i >= 0) progress.learned.splice(i, 1);
  else progress.learned.push(key);
  saveProgress();
  // Re-render current view
  if (state.tab === 'phonetics') renderPhonetics();
}

// ===== Phonics =====
function renderPhonicsRules() {
  let html = '<div class="section-title">🔤 自然拼读 · 字母与组合发音</div>';
  html += '<div style="font-size:13px;color:#666;margin-bottom:12px">点击例词朗读,学习字母在单词中的发音规律</div>';
  DATA.phonics.forEach(p => {
    html += `<div class="phonics-card">
      <div><span class="phonics-pattern">${p.pattern}</span><span class="phonics-sound">${p.sound}</span></div>
      <div class="phonics-rule">📜 ${escapeHtml(p.rule)}</div>
      <div class="phonics-rule">📍 ${escapeHtml(p.position)}</div>
      <div class="phonics-examples">$${p.examples.map(ex => `<span class="phonics-ex" onclick="speak('${ex.word.replace(/'/g,"\\'")}')">${ex.word} ${ex.zh}</span>`).join('')}</div>
    </div>`;
  });
  app.innerHTML = html;
}

// ===== Words =====
function renderWords() {
  let html = '<div class="section-title">📖 单词拼读练习</div>';
  html += '<div class="word-filters">';
  html += `<button class="filter-btn ${state.wordLevel===0?'active':''}" onclick="setLevel(0)">全部</button>`;
  for (let lv = 1; lv <= 4; lv++) {
    html += `<button class="filter-btn ${state.wordLevel===lv?'active':''}" onclick="setLevel(${lv})">L${lv}</button>`;
  }
  html += '</div>';
  const levelNames = {1:'CVC 短元音', 2:'长元音/双元音', 3:'字母组合', 4:'多音节'};
  if (state.wordLevel > 0) html += `<div style="font-size:12px;color:#888;margin-bottom:8px">L${state.wordLevel}: ${levelNames[state.wordLevel]}</div>`;

  const words = DATA.words.filter(w => state.wordLevel === 0 || w.level === state.wordLevel);
  words.forEach(w => {
    const phonemes = w.phonemes.split('-').map(ph => `<span class="phoneme" onclick="speak('${w.word.replace(/'/g,"\\'")}')">${ph}</span>`).join('');
    html += `<div class="word-card">
      <div class="word-head">
        <span class="word-big" onclick="speak('${w.word.replace(/'/g,"\\'")}')">${w.word}</span>
        <span class="word-phon">${w.phon}</span>
        <span class="word-zh">${w.zh}</span>
      </div>
      <div class="word-break">🔊 拼读: $${phonemes} <span style="color:#888;font-size:11px">(点击音素朗读整词)</span></div>
      ${w.syllables !== w.word ? `<div class="word-break">节拍: ${w.syllables}</div>` : ''}
      <div class="word-sentence" onclick="speak('${w.sentence.replace(/'/g,"\\'")}')">💬 ${escapeHtml(w.sentence)} — ${escapeHtml(w.sentence_zh)}</div>
    </div>`;
  });
  app.innerHTML = html;
}

function setLevel(lv) { state.wordLevel = lv; renderWords(); }

// ===== Sentences =====
function renderSentences() {
  let html = '<div class="section-title">💬 简单句子</div>';
  const themes = {};
  DATA.sentences.forEach(s => {
    if (!themes[s.theme]) themes[s.theme] = [];
    themes[s.theme].push(s);
  });
  Object.keys(themes).forEach(theme => {
    html += `<div class="section-title" style="font-size:15px;margin-top:16px">${theme}</div>`;
    themes[theme].forEach(s => {
      html += `<div class="sent-card">
        <div class="sent-en" onclick="speak('${s.en.replace(/'/g,"\\'")}')">${escapeHtml(s.en)}</div>
        <div class="sent-zh">${escapeHtml(s.zh)}</div>
        <div class="sent-words">$${s.words.map(w => `<span class="sent-word" onclick="speak('${w.word.replace(/'/g,"\\'")}')">${w.word}</span>`).join('')}</div>
        <div class="sent-tip">💡 ${escapeHtml(s.tip)}</div>
      </div>`;
    });
  });
  app.innerHTML = html;
}

window.selectPhon = selectPhon;
window.playPhoneticAudio = playPhoneticAudio;
window.markLearned = markLearned;
window.setLevel = setLevel;
window.speak = speak;

// Init voices
if ('speechSynthesis' in window) {
  speechSynthesis.onvoiceschanged = () => {};
  speechSynthesis.getVoices();
}

render();
</script>
</body>
</html>
