<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
       background: #f5f5f7; color: #1d1d1f; -webkit-text-size-adjust: 100%; }
header { background: #1d1d1f; color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 10; }

.scene-info .chars span { display: inline-block; background: #f0f0f2; padding: 4px 10px; border-radius: 12px; margin-right: 6px; }

.dialogue { background: #fff; border-radius: 12px; overflow: hidden; margin-bottom: 12px; }

.vocab-card .example { font-size: 12px; color: #0071e3; margin-top: 6px; font-style: italic; cursor: pointer; }

.controls { position: sticky; bottom: 12px; background: #fff; padding: 10px 16px; border-radius: 999px; box-shadow: 0 2px 8px rgba(0,0,0,.1); display: inline-flex; gap: 8px; align-items: center; font-size: 13px; }
.controls button { border: none; background: #f0f0f2; padding: 6px 12px; border-radius: 999px; cursor: pointer; font-size: 12px; }
.controls button.active { background: #0071e3; color: #fff; }
.controls input[type=range] { width: 80px; }

.hidden { display: none; }
.progress-bar { height: 4px; background: #e5e5e7; border-radius: 2px; margin-top: 8px; overflow: hidden; }
.progress-bar > div { height: 100%; background: #34c759; transition: width .3s; }
.mastered-badge { font-size: 10px; color: #34c759; margin-left: 6px; }

<script>
const DATA = [{"category": "职场", "topic": "技术面试:自我介绍 + 项目深挖", "title": "技术面试实战", "scene": "一位求职者正在参加技术岗位面试，面试官深入询问其项目经验。", "characters": [{"name": "Linda", "role": "面试官"}, {"name": "Jack", "role": "应聘者"}], "dialogue": [{"speaker": "Linda", "en": "Hi Jack, thanks for coming in. Can you start by telling me a bit about yourself?", "zh": "嗨，Jack，感谢你来面试。能先简单介绍一下你自己吗？"}, {"speaker": "Jack", "en": "Sure! I’m a software engineer with three years of experience, mostly in web development.", "zh": "当然！我是一名有三年经验的软件工程师，主要做网页开发。"}, {"speaker": "Linda", "en": "Great. What was your most recent project? I’d love to hear more about it.", "zh": "很好。你最近的一个项目是什么？我很想多听听细节。"}, {"speaker": "Jack", "en": "I led a team that built an e-commerce platform using React and Node.js.", "zh": "我带领团队用React和Node.js搭建了一个电商平台。"}, {"speaker": "Linda", "en": "Interesting. What was your biggest challenge during that project?", "zh": "有意思。这个项目中你遇到的最大挑战是什么？"}, {"speaker": "Jack", "en": "We had tight deadlines, so we used Agile to stay on track and deliver features faster.", "zh": "我们时间很紧，所以用了敏捷开发来保持进度，更快交付功能。"}, {"speaker": "Linda", "en": "Smart move. How did you handle conflicts within the team?", "zh": "明智的选择。你们怎么处理团队内的分歧？"}, {"speaker": "Jack", "en": "I scheduled weekly stand-ups and encouraged open communication — it really helped.", "zh": "我安排了每周站会，鼓励开放沟通——效果很好。"}, {"speaker": "Linda", "en": "Nice. Did you use any testing frameworks? Why that choice?", "zh": "不错。你们用过测试框架吗？为什么选那个？"}, {"speaker": "Jack", "en": "Yes, we picked Jest because it’s easy to set up and works well with React.", "zh": "是的，我们选了Jest，因为它容易设置，而且和React配合得很好。"}, {"speaker": "Linda", "en": "Good call. What would you improve if you could redo the project?", "zh": "选得不错。如果重做这个项目，你会改进什么？"}, {"speaker": "Jack", "en": "I’d add automated CI/CD pipelines earlier — it would’ve saved us time in deployment.", "zh": "我会更早引入自动化CI/CD流水线——这样能节省部署时间。"}, {"speaker": "Linda", "en": "That’s a solid reflection. Any other tools or skills you want to highlight?", "zh": "很好的反思。还有其他工具或技能你想强调的吗？"}, {"speaker": "Jack", "en": "I’m also comfortable with Docker and cloud services like AWS — I’ve used them in past projects.", "zh": "我也熟悉Docker和AWS这类云服务——我在之前的项目里用过。"}, {"speaker": "Linda", "en": "Perfect. Thanks, Jack. We’ll be in touch soon!", "zh": "太好了。谢谢Jack，我们会尽快联系你！"}], "vocabulary": [{"en": "Agile", "zh": "敏捷开发", "example": "Our team followed Agile to release updates every two weeks."}, {"en": "stand-ups", "zh": "站会", "example": "We do daily stand-ups to quickly share progress."}, {"en": "testing frameworks", "zh": "测试框架", "example": "Jest is a popular testing framework for JavaScript apps."}, {"en": "CI/CD pipelines", "zh": "持续集成/持续部署流水线", "example": "Setting up CI/CD pipelines helps automate testing and deployment."}, {"en": "cloud services", "zh": "云服务", "example": "Many companies now rely on cloud services like AWS or Azure."}, {"en": "tight deadlines", "zh": "紧张的截止日期", "example": "We met tight deadlines by working overtime and prioritizing tasks."}, {"en": "open communication", "zh": "开放沟通", "example": "Open communication builds trust and reduces misunderstandings."}, {"en": "solid reflection", "zh": "扎实的反思", "example": "Your solid reflection shows you learn from every project."}], "tips": ["在英语面试中，常用'I'd'代替'I would'，使语气更自然口语化。", "回答问题时尽量使用具体例子（如工具名、方法名），让答案更有说服力。", "注意重读关键词，比如'Agile', 'Jest', 'CI/CD'，帮助面试官抓住重点。"]}, {"category": "职场", "topic": "周会汇报:同步进度 + 阻塞问题", "title": "周会进度汇报", "scene": "每周五下午，团队在会议室开周会，同步项目进展并讨论卡点。", "characters": [{"name": "Linda", "role": "项目经理"}, {"name": "Tom", "role": "前端开发工程师"}], "dialogue": [{"speaker": "Linda", "en": "Alright, Tom, can you give us a quick update on the dashboard project?", "zh": "好的，Tom，你能快速更新一下仪表盘项目的进展吗？"}, {"speaker": "Tom", "en": "Sure. I’ve finished the user login module and started working on the data visualization part.", "zh": "当然。我已经完成了用户登录模块，现在开始做数据可视化部分。"}, {"speaker": "Linda", "en": "That’s great! Any blockers so far?", "zh": "太好了！目前有什么阻塞问题吗？"}, {"speaker": "Tom", "en": "Actually, yes — I’m waiting for the backend API specs from Alex. Without them, I can’t proceed.", "zh": "其实有——我正在等Alex给的后端API规范，没有这些我就没法继续。"}, {"speaker": "Linda", "en": "Got it. I’ll follow up with Alex today. Anything else holding you back?", "zh": "明白了。我今天会去跟进Alex。还有别的阻碍你吗？"}, {"speaker": "Tom", "en": "Not really, but I need to test the charts with real data — can we get sample datasets soon?", "zh": "倒没有别的，但我需要用真实数据测试图表——我们能尽快拿到样本数据集吗？"}, {"speaker": "Linda", "en": "I’ll ask the data team to send you a dummy dataset by tomorrow morning.", "zh": "我会让数据团队明天早上前给你发一个模拟数据集。"}, {"speaker": "Tom", "en": "Perfect. That’ll help me stay on track for next week’s demo.", "zh": "太好了，这样我就能按计划准备下周的演示了。"}, {"speaker": "Linda", "en": "Good. Keep me posted if anything changes — especially if you hit another roadblock.", "zh": "很好。如果情况有变，特别是遇到新障碍，请随时告诉我。"}, {"speaker": "Tom", "en": "Will do. I’ll also share my progress in Slack at the end of each day.", "zh": "没问题。我每天下班前也会在Slack上分享我的进展。"}, {"speaker": "Linda", "en": "Smart move. It helps everyone stay aligned without extra meetings.", "zh": "好主意。这样大家不用开会也能保持同步。"}, {"speaker": "Tom", "en": "Yeah, I think daily updates are way more efficient than weekly ones sometimes.", "zh": "是啊，我觉得有时候每日更新比每周更新更高效。"}, {"speaker": "Linda", "en": "Agreed. And don’t forget — if you’re stuck, just ping me directly.", "zh": "同意。还有别忘了——如果你卡住了，直接@我就行。"}, {"speaker": "Tom", "en": "Thanks, Linda. I appreciate the support.", "zh": "谢谢，Linda，我很感激你的支持。"}, {"speaker": "Linda", "en": "Anytime. Let’s keep this momentum going!", "zh": "随时找我。让我们继续保持这个势头！"}], "vocabulary": [{"en": "blocker", "zh": "阻塞问题", "example": "The missing API is a major blocker for the frontend team."}, {"en": "follow up", "zh": "跟进", "example": "I’ll follow up with the client after the meeting."}, {"en": "on track", "zh": "按计划进行", "example": "We’re still on track to launch by Friday."}, {"en": "dummy dataset", "zh": "模拟数据集", "example": "Use a dummy dataset to test the UI before real data arrives."}, {"en": "keep me posted", "zh": "随时告知我", "example": "Keep me posted if the deadline changes."}, {"en": "stay aligned", "zh": "保持一致/同步", "example": "Daily standups help the team stay aligned."}, {"en": "ping someone", "zh": "直接联系某人（常用于即时通讯）", "example": "If you have questions, just ping me on Slack."}, {"en": "momentum", "zh": "势头、动力", "example": "Let’s keep the momentum going with this new feature."}], "tips": ["口语中常用 'ping someone' 表示‘直接找某人’，比 'contact' 更自然，多用于工作聊天工具如Slack或微信。", "‘Keep me posted’ 是职场高频短语，表示‘随时告诉我最新进展’，语气友好且专业。", "注意 ‘blocker’ 和 ‘roadblock’ 都可指‘障碍’，但在敏捷开发中更常用 ‘blocker’ 来描述影响进度的问题。"]}, {"category": "职场", "topic": "和老板 1on1:谈晋升加薪", "title": "升职加薪面谈", "scene": "员工小李与老板在会议室进行一对一谈话，讨论职业发展和薪资调整。", "characters": [{"name": "Lisa", "role": "部门经理"}, {"name": "Li Wei", "role": "资深员工"}], "dialogue": [{"speaker": "Li Wei", "en": "Hi Lisa, thanks for making time to meet with me today.", "zh": "嗨，Lisa，谢谢你今天抽空和我见面。"}, {"speaker": "Lisa", "en": "Of course, Li Wei. I’m always happy to chat about your progress.", "zh": "当然，小李。我很乐意聊聊你的进展。"}, {"speaker": "Li Wei", "en": "I’ve been here for two years now, and I feel ready for more responsibility.", "zh": "我已经在这里工作两年了，觉得自己可以承担更多责任。"}, {"speaker": "Lisa", "en": "That’s great to hear. What kind of role are you thinking about?", "zh": "很高兴听你这么说。你心里想的是什么职位？"}, {"speaker": "Li Wei", "en": "I’d love to move into a team lead position — I’ve already mentored new hires.", "zh": "我想晋升为团队负责人——我已经指导过新员工了。"}, {"speaker": "Lisa", "en": "You’re right, you’ve done well mentoring others. That’s leadership material.", "zh": "没错，你在指导他人方面做得很好，这正是领导力的表现。"}, {"speaker": "Li Wei", "en": "Thanks! And I was wondering if we could also talk about salary adjustment.", "zh": "谢谢！另外，我想问问我们能不能也谈谈薪资调整的事。"}, {"speaker": "Lisa", "en": "Fair enough. Let’s look at the market rate and your performance together.", "zh": "合理。我们一起看看市场行情和你的表现。"}, {"speaker": "Li Wei", "en": "I’ve taken on extra projects without extra pay — I think that deserves recognition.", "zh": "我承担了额外项目但没加薪，我觉得这值得认可。"}, {"speaker": "Lisa", "en": "You’re absolutely right. We’ll review your compensation next quarter.", "zh": "你说得对。我们下个季度会重新评估你的薪酬。"}, {"speaker": "Li Wei", "en": "That sounds good. Can I get a rough idea of the raise range?", "zh": "听起来不错。能给我一个大概的加薪幅度吗？"}, {"speaker": "Lisa", "en": "Typically it’s between 5% to 10%, depending on budget and performance.", "zh": "通常在5%到10%之间，取决于预算和表现。"}, {"speaker": "Li Wei", "en": "Got it. I’ll keep delivering strong results until then.", "zh": "明白了。我会继续努力做出好成绩。"}, {"speaker": "Lisa", "en": "That’s the spirit. I’ll send you an email with next steps by Friday.", "zh": "就是这种态度。我会在周五前发邮件给你下一步安排。"}, {"speaker": "Li Wei", "en": "Perfect. Thanks again, Lisa — I really appreciate your support.", "zh": "太好了。再次感谢，Lisa——我真的很感激你的支持。"}, {"speaker": "Lisa", "en": "My pleasure. Keep up the great work!", "zh": "别客气。继续保持优秀表现！"}], "vocabulary": [{"en": "mentor", "zh": "指导", "example": "She mentors junior staff every month."}, {"en": "responsibility", "zh": "责任", "example": "The manager gave him more responsibility."}, {"en": "compensation", "zh": "薪酬", "example": "We need to adjust your compensation based on your role."}, {"en": "performance", "zh": "表现", "example": "Your performance this year has been outstanding."}, {"en": "raise", "zh": "加薪", "example": "He got a 7% raise after his review."}, {"en": "market rate", "zh": "市场行情", "example": "Our salaries are aligned with the market rate."}, {"en": "next steps", "zh": "下一步", "example": "Let’s discuss the next steps in our meeting."}, {"en": "deliver results", "zh": "交付成果", "example": "You need to deliver results to get promoted."}], "tips": ["注意使用 'I was wondering if...' 来委婉提出请求，比直接说 'Can I...' 更礼貌。", "在职场对话中，'That’s fair enough.' 是表达认同对方观点的常用语，自然又专业。", "发音重点：'raise' 和 'rays' 同音，记住它是名词/动词，表示‘加薪’而非‘光线’。"]}, {"category": "职场", "topic": "跨团队协作:推动其他组排期", "title": "催排期沟通", "scene": "市场部需技术部配合上线新功能，但对方排期紧张，需协商优先级。", "characters": [{"name": "Linda", "role": "市场部项目经理"}, {"name": "Tom", "role": "技术部开发组长"}], "dialogue": [{"speaker": "Linda", "en": "Hey Tom, do you have a quick minute? I need to talk about the new feature launch.", "zh": "嘿Tom，你有空吗？我想聊聊新功能上线的事。"}, {"speaker": "Tom", "en": "Sure, I’m just wrapping up a meeting. What’s up?", "zh": "当然，我刚开完会。什么事？"}, {"speaker": "Linda", "en": "We really need your team to prioritize the API integration next week. It’s critical for our campaign.", "zh": "我们真的需要你们团队下周优先处理API对接，这对我们的活动至关重要。"}, {"speaker": "Tom", "en": "I get that, but we’re already swamped with the payment module upgrade.", "zh": "我理解，但我们已经在忙支付模块升级了。"}, {"speaker": "Linda", "en": "Could we maybe shift the payment work to the following week? Just this once?", "zh": "能不能把支付模块的工作挪到下下周？就这一次？"}, {"speaker": "Tom", "en": "That’s tricky… our QA team is booked solid next week too.", "zh": "这有点难……我们的测试团队下周也排满了。"}, {"speaker": "Linda", "en": "What if we add one more QA person from our side? Would that help?", "zh": "如果我们从市场部加派一名测试人员呢？能帮上忙吗？"}, {"speaker": "Tom", "en": "Hmm, that could actually make a difference. Let me check with my team.", "zh": "嗯，那可能真有帮助。我先和团队确认一下。"}, {"speaker": "Linda", "en": "Thanks! And if we can’t move the payment work, maybe we can split the API task into two parts?", "zh": "谢谢！如果支付模块没法挪，也许可以把API任务拆成两部分？"}, {"speaker": "Tom", "en": "Splitting it might work — phase one by Friday, phase two next Monday?", "zh": "拆分或许可行——第一阶段周五完成，第二阶段下周一？"}, {"speaker": "Linda", "en": "Perfect! That gives us enough runway for the campaign. Can you confirm by EOD today?", "zh": "太好了！这样我们就有足够时间准备活动了。今天下班前能确认吗？"}, {"speaker": "Tom", "en": "I’ll send you an update by 5 PM. We’ll try to make it happen.", "zh": "我会在下午5点前给你更新。我们会尽力搞定。"}, {"speaker": "Linda", "en": "You’re a lifesaver, Tom. Really appreciate it!", "zh": "你真是救星，Tom，太感谢了！"}, {"speaker": "Tom", "en": "No problem — teamwork makes the dream work, right?", "zh": "没问题——团队合作才能让梦想成真，对吧？"}, {"speaker": "Linda", "en": "Exactly! Let’s touch base tomorrow to lock in the details.", "zh": "没错！明天我们再碰一下，敲定细节。"}, {"speaker": "Tom", "en": "Sounds good. Talk then!", "zh": "好的，明天见！"}], "vocabulary": [{"en": "prioritize", "zh": "优先处理", "example": "Can you prioritize this task for me?"}, {"en": "swamped", "zh": "忙得不可开交", "example": "I’m swamped this week — can we meet next Tuesday?"}, {"en": "QA team", "zh": "测试团队", "example": "The QA team needs to test the feature before launch."}, {"en": "runway", "zh": "缓冲时间", "example": "We need more runway to prepare for the event."}, {"en": "EOD", "zh": "下班前（End of Day）", "example": "Please send me the report by EOD."}, {"en": "phase one", "zh": "第一阶段", "example": "Phase one of the project is almost complete."}, {"en": "touch base", "zh": "简单沟通/跟进", "example": "Let’s touch base tomorrow to discuss the plan."}, {"en": "lock in", "zh": "敲定/确认", "example": "We need to lock in the date by Friday."}], "tips": ["‘Prioritize’ 常用于职场请求，语气礼貌但明确，适合表达紧急需求。", "‘Swamped’ 是口语中常用词，表示非常忙，比 ‘busy’ 更生动，适合非正式场合。", "‘Touch base’ 是地道短语，意为‘简单沟通’，常用于邮件或会议结束时约定后续联系。"]}, {"category": "职场", "topic": "新人入职:第一天认识同事", "title": "初识同事", "scene": "新员工第一天上班，经理带他认识团队成员。", "characters": [{"name": "Lisa", "role": "资深同事，热情友好"}, {"name": "David", "role": "新入职员工，略显紧张"}], "dialogue": [{"speaker": "Lisa", "en": "Hi David, welcome to the team! I’m Lisa, your buddy for the first week.", "zh": "嗨，大卫，欢迎加入团队！我是丽莎，第一周我会带你熟悉环境。"}, {"speaker": "David", "en": "Thanks, Lisa! I’m a bit nervous, but really excited to start.", "zh": "谢谢，丽莎！我有点紧张，但真的很期待开始工作。"}, {"speaker": "Lisa", "en": "Don’t worry, everyone’s super friendly here. Let me introduce you around.", "zh": "别担心，这里每个人都很友好。我带你去认识大家。"}, {"speaker": "David", "en": "That’d be great. I’d love to know who does what.", "zh": "太好了，我很想了解每个人负责什么。"}, {"speaker": "Lisa", "en": "Over there is Mark—he handles client emails and schedules meetings.", "zh": "那边是马克——他负责客户邮件和安排会议。"}, {"speaker": "David", "en": "Oh, nice. I’ll need to work with him soon on the new project.", "zh": "哦，很好。我很快就要和他一起做新项目了。"}, {"speaker": "Lisa", "en": "Exactly! He’s really organized. You’ll like him.", "zh": "没错！他非常有条理，你会喜欢他的。"}, {"speaker": "David", "en": "Cool. And who’s that woman by the coffee machine?", "zh": "酷。那个在咖啡机旁的女士是谁？"}, {"speaker": "Lisa", "en": "That’s Jenny—she’s our design lead. She makes everything look amazing.", "zh": "那是珍妮——她是我们的设计主管，她让所有东西看起来都超棒。"}, {"speaker": "David", "en": "Wow, I saw her portfolio—it’s impressive!", "zh": "哇，我看过她的作品集——太厉害了！"}, {"speaker": "Lisa", "en": "Right? She’s also the one who organizes our Friday team lunches.", "zh": "对吧？她还负责组织我们每周五的团队午餐。"}, {"speaker": "David", "en": "That sounds fun. I’ll make sure to join next time.", "zh": "听起来很有趣，下次我一定参加。"}, {"speaker": "Lisa", "en": "You should! Oh, and this is Tom—he’s in charge of IT support.", "zh": "你一定要来！哦，这位是汤姆——他负责IT支持。"}, {"speaker": "David", "en": "Perfect—I already have a few tech questions. Thanks, Lisa!", "zh": "太好了——我正好有几个技术问题。谢谢你，丽莎！"}, {"speaker": "Lisa", "en": "No problem! Just ping me if you need anything. We’re all here to help.", "zh": "不客气！有需要随时找我，我们都会帮你。"}, {"speaker": "David", "en": "I really appreciate it. I feel much more at ease now.", "zh": "我真的很感激，现在感觉轻松多了。"}, {"speaker": "Lisa", "en": "That’s what teamwork is about. Let’s grab some coffee and chat more!", "zh": "这就是团队合作的意义。我们去喝杯咖啡，多聊聊吧！"}], "vocabulary": [{"en": "buddy", "zh": "伙伴；搭档", "example": "Lisa is my buddy for the first week."}, {"en": "handle", "zh": "负责；处理", "example": "Mark handles client emails."}, {"en": "portfolio", "zh": "作品集", "example": "Jenny’s portfolio is impressive."}, {"en": "organized", "zh": "有条理的", "example": "Mark is very organized."}, {"en": "in charge of", "zh": "负责", "example": "Tom is in charge of IT support."}, {"en": "ping", "zh": "联系（非正式）", "example": "Just ping me if you need help."}, {"en": "at ease", "zh": "放松的；自在的", "example": "I feel much more at ease now."}, {"en": "teamwork", "zh": "团队合作", "example": "Teamwork means helping each other."}], "tips": ["‘Ping’ 是职场中常用的非正式动词，意思是‘发消息联系’，比 ‘call’ 或 ‘email’ 更随意。", "‘In charge of’ 后面接名词或动名词，表示‘负责某事’，如：She is in charge of marketing.", "‘At ease’ 常用于表达心理状态，可替换为 ‘relaxed’，但在职场语境中更自然、礼貌。"]}, {"category": "生活", "topic": "餐厅点餐:有过敏原,询问推荐", "title": "点餐避过敏", "scene": "顾客在西餐厅点餐，告知服务员对坚果过敏，希望推荐安全菜品。", "characters": [{"name": "Linda", "role": "服务员"}, {"name": "Tom", "role": "顾客"}], "dialogue": [{"speaker": "Tom", "en": "Hi, I’m Tom. I have a nut allergy — can you help me pick something safe?", "zh": "你好，我是Tom。我对坚果过敏，能帮我选个安全的菜吗？"}, {"speaker": "Linda", "en": "Of course! We take allergies seriously. What kind of food do you like?", "zh": "当然可以！我们很重视过敏问题。你喜欢哪种食物？"}, {"speaker": "Tom", "en": "I love pasta, but not if it has pesto — that usually has pine nuts.", "zh": "我喜欢意大利面，但不要青酱的——那通常含松子。"}, {"speaker": "Linda", "en": "Good catch! Our tomato basil pasta is totally nut-free. Want to try that?", "zh": "说得对！我们的番茄罗勒意面完全不含坚果，想试试吗？"}, {"speaker": "Tom", "en": "Sounds great. Is the sauce made in-house? Any chance of cross-contamination?", "zh": "听起来不错。酱料是自制的吗？有没有交叉污染的风险？"}, {"speaker": "Linda", "en": "Yes, we make it fresh daily. And we use separate utensils for allergy-safe dishes.", "zh": "是的，我们每天现做。而且为过敏餐单独使用餐具。"}, {"speaker": "Tom", "en": "That’s reassuring. What about dessert? Anything without nuts?", "zh": "这让我放心了。甜点呢？有没有不含坚果的？"}, {"speaker": "Linda", "en": "We have chocolate mousse — no nuts at all. Or vanilla ice cream with berries.", "zh": "我们有巧克力慕斯——完全不含坚果。或者香草冰淇淋配莓果。"}, {"speaker": "Tom", "en": "Perfect! I’ll go with the pasta and the chocolate mousse.", "zh": "太好了！我要意面和巧克力慕斯。"}, {"speaker": "Linda", "en": "Got it. I’ll mark your order as ‘allergy alert’ so the kitchen knows.", "zh": "好的，我会在订单上标注‘过敏提醒’，让厨房注意。"}, {"speaker": "Tom", "en": "Thanks so much. You’ve been really helpful!", "zh": "非常感谢！你帮了大忙！"}, {"speaker": "Linda", "en": "My pleasure! Enjoy your meal — let me know if you need anything else.", "zh": "不客气！祝您用餐愉快——有需要随时叫我。"}, {"speaker": "Tom", "en": "Will do. One last thing — is there soy in the pasta sauce?", "zh": "好的。最后问一下——意面酱里有大豆吗？"}, {"speaker": "Linda", "en": "Nope, just tomatoes, garlic, olive oil, and fresh herbs. Totally soy-free.", "zh": "没有，只有番茄、大蒜、橄榄油和新鲜香草，完全不含大豆。"}, {"speaker": "Tom", "en": "Awesome! I feel safe ordering now. Thanks again!", "zh": "太棒了！我现在可以安心点了。再次感谢！"}, {"speaker": "Linda", "en": "You’re welcome! We want everyone to enjoy their meal safely.", "zh": "不客气！我们希望每位客人都能吃得安心。"}], "vocabulary": [{"en": "nut allergy", "zh": "坚果过敏", "example": "He has a nut allergy, so he avoids all snacks with peanuts."}, {"en": "cross-contamination", "zh": "交叉污染", "example": "Be careful of cross-contamination when cooking for someone with allergies."}, {"en": "in-house", "zh": "自制的，内部制作的", "example": "Our desserts are all made in-house with fresh ingredients."}, {"en": "allergy alert", "zh": "过敏提醒", "example": "Please put an allergy alert on this customer’s order."}, {"en": "reassuring", "zh": "令人安心的", "example": "It’s reassuring to know the staff checks for allergens carefully."}, {"en": "pesto", "zh": "青酱", "example": "Pesto is usually made with basil, garlic, and pine nuts."}, {"en": "soy-free", "zh": "无大豆的", "example": "This dish is soy-free, perfect for people avoiding soy products."}, {"en": "utensils", "zh": "餐具", "example": "The kitchen uses separate utensils for gluten-free meals."}], "tips": ["英语中 'allergy alert' 是餐厅常用术语，表示特殊饮食需求，建议记住并主动使用。", "说 'Is there...?' 比 'Do you have...?' 更自然地用于确认成分，比如 'Is there soy in this?'", "发音注意：'pesto' 读作 /ˈpestoʊ/，不是“佩斯托”，重音在第一个音节。"]}, {"category": "生活", "topic": "超市购物:找商品 + 询问折扣", "title": "超市寻物问折扣", "scene": "顾客在超市找商品并询问促销信息，店员热心帮助。", "characters": [{"name": "Lily", "role": "顾客"}, {"name": "Tom", "role": "超市员工"}], "dialogue": [{"speaker": "Lily", "en": "Hi, excuse me. Do you have organic rice in stock?", "zh": "你好，打扰一下。你们有有机大米吗？"}, {"speaker": "Tom", "en": "Yes, we do! It’s in aisle 5, near the beans.", "zh": "有的！在第5通道，豆类旁边。"}, {"speaker": "Lily", "en": "Great! Is it on sale right now?", "zh": "太好了！现在有打折吗？"}, {"speaker": "Tom", "en": "Actually, yes — 20% off this week only.", "zh": "确实有——这周限时八折。"}, {"speaker": "Lily", "en": "That’s a good deal. Where can I find the frozen dumplings?", "zh": "挺划算的。冷冻饺子在哪里？"}, {"speaker": "Tom", "en": "Frozen section, aisle 8. Look for the red sign.", "zh": "冷冻区，第8通道。找红色标牌。"}, {"speaker": "Lily", "en": "Thanks! Are there any discounts on those too?", "zh": "谢谢！那些也有折扣吗？"}, {"speaker": "Tom", "en": "Not currently, but we’ll have a buy-one-get-one next weekend.", "zh": "目前没有，但下周末买一送一。"}, {"speaker": "Lily", "en": "Got it. What about the olive oil? Any promo?", "zh": "明白了。那橄榄油呢？有促销吗？"}, {"speaker": "Tom", "en": "Yep — it’s half price if you buy two bottles.", "zh": "有！买两瓶半价。"}, {"speaker": "Lily", "en": "Perfect. Can I get a shopping basket?", "zh": "太好了。能给我个购物篮吗？"}, {"speaker": "Tom", "en": "Sure, right over there by the entrance.", "zh": "当然，在入口那边。"}, {"speaker": "Lily", "en": "One more thing — do you accept mobile payments?", "zh": "再问一下，你们支持手机支付吗？"}, {"speaker": "Tom", "en": "Absolutely. We take WeChat Pay and Alipay.", "zh": "当然可以，我们支持微信和支付宝。"}, {"speaker": "Lily", "en": "Awesome! Thanks so much for your help.", "zh": "太棒了！非常感谢你的帮助。"}, {"speaker": "Tom", "en": "You’re welcome! Happy shopping!", "zh": "不客气！祝您购物愉快！"}], "vocabulary": [{"en": "in stock", "zh": "有货", "example": "Is this item in stock?"}, {"en": "on sale", "zh": "打折", "example": "The shoes are on sale today."}, {"en": "aisle", "zh": "货架通道", "example": "Find the cereal in aisle 3."}, {"en": "frozen section", "zh": "冷冻区", "example": "The ice cream is in the frozen section."}, {"en": "buy-one-get-one", "zh": "买一送一", "example": "We have a buy-one-get-one deal on soda."}, {"en": "half price", "zh": "半价", "example": "This dress is half price this week."}, {"en": "shopping basket", "zh": "购物篮", "example": "Grab a shopping basket before you start."}, {"en": "mobile payments", "zh": "移动支付", "example": "Most stores now accept mobile payments."}], "tips": ["注意‘on sale’和‘for sale’的区别：前者是‘打折’，后者是‘待售’。", "英语中常用‘Can I...?’或‘Could you...?’礼貌请求，比‘Give me...’更自然。", "‘Aisle’发音为 /aɪl/，像‘ile’，不要读成‘aisle’像‘isle’（岛屿）。"]}, {"category": "生活", "topic": "租房看房:和中介询问房屋细节", "title": "看房问细节", "scene": "租客小李和房产中介王姐在公寓内看房，小李询问房屋设施与费用细节。", "characters": [{"name": "Li Xiao", "role": "租客"}, {"name": "Wang Jie", "role": "房产中介"}], "dialogue": [{"speaker": "Li Xiao", "en": "Hi Wang Jie, this place looks nice. Can you tell me more about the utilities?", "zh": "嗨，王姐，这地方看起来不错。能告诉我水电费怎么算吗？"}, {"speaker": "Wang Jie", "en": "Sure! The rent includes water and internet. Electricity is separate — around 1.2 RMB per kWh.", "zh": "当然！房租包含水费和网络。电费另算，大约每度1.2元。"}, {"speaker": "Li Xiao", "en": "Got it. Is there a washing machine in the unit?", "zh": "明白了。这套房里有洗衣机吗？"}, {"speaker": "Wang Jie", "en": "Yes, it’s in the bathroom. It’s brand new — you’ll love it!", "zh": "有，在浴室里。是全新的，你一定会喜欢！"}, {"speaker": "Li Xiao", "en": "That’s great. What about parking? I have a small car.", "zh": "太好了。那停车呢？我有一辆小车。"}, {"speaker": "Wang Jie", "en": "There’s a covered parking spot downstairs. It’s 300 RMB/month extra.", "zh": "楼下有带顶棚的停车位，每月额外300元。"}, {"speaker": "Li Xiao", "en": "Okay, reasonable. Is the building pet-friendly?", "zh": "好的，挺合理。这栋楼允许养宠物吗？"}, {"speaker": "Wang Jie", "en": "Unfortunately, no pets allowed. The landlord prefers quiet tenants.", "zh": "很遗憾，不允许养宠物。房东喜欢安静的租客。"}, {"speaker": "Li Xiao", "en": "I see. How long is the lease? Minimum six months?", "zh": "明白了。租期多久？最少六个月吗？"}, {"speaker": "Wang Jie", "en": "Exactly — minimum six months. You can renew after that if you like it.", "zh": "没错，最少六个月。之后如果喜欢可以续租。"}, {"speaker": "Li Xiao", "en": "What’s the deposit? Is it refundable?", "zh": "押金是多少？退房时能退吗？"}, {"speaker": "Wang Jie", "en": "One month’s rent as deposit. Fully refundable if no damage or unpaid bills.", "zh": "一个月房租作押金，无损坏或欠费可全额退还。"}, {"speaker": "Li Xiao", "en": "Perfect. Can I move in next week?", "zh": "太好了。我下周能搬进来吗？"}, {"speaker": "Wang Jie", "en": "Let me check with the landlord... Yes, it’s available next Monday!", "zh": "我跟房东确认下……可以，下周一就能入住！"}, {"speaker": "Li Xiao", "en": "Awesome! I’ll sign the contract tomorrow then.", "zh": "太棒了！那我明天就签合同。"}, {"speaker": "Wang Jie", "en": "Great! Bring your ID and first month’s rent. See you tomorrow!", "zh": "太好了！记得带身份证和首月房租，明天见！"}], "vocabulary": [{"en": "utilities", "zh": "水电煤等公共事业费用", "example": "The rent doesn’t include utilities."}, {"en": "washing machine", "zh": "洗衣机", "example": "There’s a washing machine in the laundry room."}, {"en": "parking spot", "zh": "停车位", "example": "Is there a reserved parking spot for me?"}, {"en": "pet-friendly", "zh": "允许养宠物的", "example": "This apartment is not pet-friendly."}, {"en": "lease", "zh": "租约", "example": "The lease is for one year."}, {"en": "deposit", "zh": "押金", "example": "You need to pay a deposit before moving in."}, {"en": "refundable", "zh": "可退还的", "example": "The deposit is fully refundable."}, {"en": "move in", "zh": "搬入", "example": "I’m moving in next Tuesday."}], "tips": ["‘Utilities’ 是复数形式，指水、电、燃气等综合费用，常用于租房对话中。", "说 ‘Is it pet-friendly?’ 比 ‘Can I keep pets here?’ 更自然地道，符合英语母语者习惯。", "‘Refundable’ 发音注意重音在第二音节：/rɪˈfʌndəbl/，避免读成‘ref-UN-dable’。"]}, {"category": "生活", "topic": "医院看病:描述症状 + 询问用药", "title": "诊所问诊记", "scene": "一位患者在社区诊所向医生描述感冒症状并询问药物用法。", "characters": [{"name": "Dr. Lee", "role": "诊所医生"}, {"name": "Linda", "role": "就诊患者"}], "dialogue": [{"speaker": "Linda", "en": "Hi, Doctor Lee. I’ve been feeling really run down lately.", "zh": "你好，李医生。我最近感觉特别累。"}, {"speaker": "Dr. Lee", "en": "Okay, what symptoms are you having exactly?", "zh": "好的，你具体有哪些症状？"}, {"speaker": "Linda", "en": "I have a sore throat, a bit of fever, and my nose is stuffy.", "zh": "我喉咙痛，有点发烧，鼻子也堵着。"}, {"speaker": "Dr. Lee", "en": "Any cough or headache?", "zh": "有咳嗽或头痛吗？"}, {"speaker": "Linda", "en": "Yes, a dry cough — it’s worse at night.", "zh": "有的，干咳，晚上更严重。"}, {"speaker": "Dr. Lee", "en": "Hmm, sounds like a common cold. Let me check your temperature.", "zh": "嗯，听起来像普通感冒。我来给你量一下体温。"}, {"speaker": "Linda", "en": "Is it serious? Should I take antibiotics?", "zh": "严重吗？我需要吃抗生素吗？"}, {"speaker": "Dr. Lee", "en": "No, antibiotics won’t help here — it’s viral. Just rest and drink fluids.", "zh": "不用，抗生素没用——这是病毒性的。多休息、多喝水就行。"}, {"speaker": "Linda", "en": "What about the medicine you’re prescribing? How often should I take it?", "zh": "那您开的药怎么吃？一天几次？"}, {"speaker": "Dr. Lee", "en": "Take this syrup three times a day after meals. Don’t skip doses.", "zh": "这个糖浆饭后吃，一天三次，别漏服。"}, {"speaker": "Linda", "en": "Got it. Can I still go to work?", "zh": "明白了。我还能去上班吗？"}, {"speaker": "Dr. Lee", "en": "Better stay home for two days. Your body needs time to recover.", "zh": "最好在家休息两天，身体需要时间恢复。"}, {"speaker": "Linda", "en": "Thanks, Doctor. One last question — can I drink coffee while taking this?", "zh": "谢谢医生。最后问一下，吃这药能喝咖啡吗？"}, {"speaker": "Dr. Lee", "en": "Not recommended. Coffee might make you feel more jittery with the medicine.", "zh": "不建议。咖啡可能让你吃药后更心慌。"}, {"speaker": "Linda", "en": "Alright, I’ll switch to tea then. Thanks so much!", "zh": "好吧，那我改喝茶。太感谢了！"}, {"speaker": "Dr. Lee", "en": "You’re welcome. Call if symptoms get worse, okay?", "zh": "不客气。如果症状加重，记得打电话来。"}, {"speaker": "Linda", "en": "Will do! Have a great day, Doctor.", "zh": "一定！祝您今天愉快，医生。"}], "vocabulary": [{"en": "run down", "zh": "疲惫不堪", "example": "I’ve been feeling run down since Monday."}, {"en": "sore throat", "zh": "喉咙痛", "example": "She couldn’t talk because of her sore throat."}, {"en": "stuffy nose", "zh": "鼻塞", "example": "A stuffy nose makes it hard to sleep."}, {"en": "dry cough", "zh": "干咳", "example": "He has a dry cough that keeps him awake."}, {"en": "antibiotics", "zh": "抗生素", "example": "Antibiotics don’t work for colds."}, {"en": "syrup", "zh": "糖浆", "example": "The kids love the cherry-flavored syrup."}, {"en": "skip doses", "zh": "漏服药", "example": "Don’t skip doses — it reduces the medicine’s effect."}, {"en": "jittery", "zh": "紧张不安的；发抖的", "example": "Coffee made her feel jittery before the meeting."}], "tips": ["注意‘take medicine’是固定搭配，不要说‘eat medicine’（中文直译错误）。", "英语中‘how often’用于询问频率，比如‘How often should I take it?’（多久吃一次？）。", "‘run down’是口语常用词，表示‘疲劳’，比‘tired’语气更重，适合描述持续状态。"]}, {"category": "生活", "topic": "理发店:描述想要的发型", "title": "剪个清爽发型", "scene": "顾客在理发店向发型师描述自己想要的发型，包括长度、层次和风格。", "characters": [{"name": "Liam", "role": "发型师"}, {"name": "Emma", "role": "顾客"}], "dialogue": [{"speaker": "Emma", "en": "Hi, I’d like to get a fresh cut today. Something easy to manage.", "zh": "嗨，我今天想剪个清爽的发型，好打理的那种。"}, {"speaker": "Liam", "en": "Got it. Do you want it short on the sides and longer on top?", "zh": "明白了。你想要两边剪短，头顶留长吗？"}, {"speaker": "Emma", "en": "Yes, but not too long — maybe just above my ears?", "zh": "对，但别太长——大概到耳朵上面一点？"}, {"speaker": "Liam", "en": "Cool. Want some layers or keep it smooth?", "zh": "好。要加点层次感，还是保持顺滑？"}, {"speaker": "Emma", "en": "Layers, please. I want some volume up here.", "zh": "加层次吧，我想要头顶蓬松一点。"}, {"speaker": "Liam", "en": "Perfect. Any specific style? Like textured or messy?", "zh": "完美。有特别喜欢的风格吗？比如纹理感或凌乱风？"}, {"speaker": "Emma", "en": "Messy is fine — I don’t want it too neat.", "zh": "凌乱风可以，我不想要太整齐。"}, {"speaker": "Liam", "en": "Alright. How about we add a slight fade on the sides?", "zh": "好的。我们给两边加点渐变效果怎么样？"}, {"speaker": "Emma", "en": "Sounds good! Just don’t make it too sharp.", "zh": "听起来不错！不过别剪得太锋利。"}, {"speaker": "Liam", "en": "No problem. I’ll keep it soft and natural.", "zh": "没问题，我会剪得柔和自然些。"}, {"speaker": "Emma", "en": "Great. Can you show me with your fingers how it’ll look?", "zh": "太好了。你能用手指比划一下大概的样子吗？"}, {"speaker": "Liam", "en": "Sure thing. Here’s the length... and the shape...", "zh": "当然可以。长度是这样……形状是这样……"}, {"speaker": "Emma", "en": "That looks awesome! I’m excited to see the final result.", "zh": "看起来很棒！我超期待最后的效果。"}, {"speaker": "Liam", "en": "You’ll love it. I’ll be gentle with the scissors!", "zh": "你一定会喜欢的。我会小心用剪刀的！"}, {"speaker": "Emma", "en": "Thanks, Liam. You’re the best!", "zh": "谢谢你，Liam，你最棒了！"}, {"speaker": "Liam", "en": "Anytime! Let’s get started.", "zh": "随时欢迎！我们开始吧。"}], "vocabulary": [{"en": "fade", "zh": "渐变（发型）", "example": "I want a clean fade on the sides."}, {"en": "layers", "zh": "层次", "example": "Adding layers makes hair look fuller."}, {"en": "volume", "zh": "蓬松度", "example": "This product adds volume to thin hair."}, {"en": "texture", "zh": "纹理", "example": "He prefers a textured look for his hair."}, {"en": "messy", "zh": "凌乱的", "example": "She likes her hair messy and natural."}, {"en": "manage", "zh": "打理", "example": "Short hair is easier to manage in summer."}, {"en": "sharp", "zh": "锋利的；棱角分明的", "example": "Don’t make the edges too sharp."}, {"en": "natural", "zh": "自然的", "example": "I want a natural-looking haircut."}], "tips": ["注意 'fade' 和 'layer' 是发型术语，常用于英语理发对话中，需重点记忆。", "中文说‘不要剪得太尖’时，英语常用 'don’t make it too sharp'，而不是直译成 'too pointed'。", "口语中多用 'I’d like...' 或 'Can you...?' 来礼貌表达需求，避免生硬命令句式。"]}, {"category": "旅行", "topic": "机场值机:行李托运 + 选座", "title": "值机选座对话", "scene": "旅客在机场柜台办理登机手续，托运行李并选择座位。", "characters": [{"name": "Emma", "role": "机场地勤人员"}, {"name": "Li Wei", "role": "中国旅客"}], "dialogue": [{"speaker": "Emma", "en": "Good morning! May I see your passport and ticket, please?", "zh": "早上好！请出示您的护照和机票。"}, {"speaker": "Li Wei", "en": "Sure, here you go. I’m flying to London.", "zh": "好的，给您。我要飞往伦敦。"}, {"speaker": "Emma", "en": "Thanks. Do you have any checked baggage?", "zh": "谢谢。您有要托运的行李吗？"}, {"speaker": "Li Wei", "en": "Yes, just this one suitcase. Is it under 23kg?", "zh": "是的，就这个行李箱。它不到23公斤吧？"}, {"speaker": "Emma", "en": "Let me weigh it for you... Perfect, 21.5kg. You’re all set.", "zh": "我来称一下……很好，21.5公斤，没问题。"}, {"speaker": "Li Wei", "en": "Great! Can I choose my seat now?", "zh": "太好了！我现在可以选座位吗？"}, {"speaker": "Emma", "en": "Of course. Would you like a window or aisle seat?", "zh": "当然可以。您想要靠窗还是靠过道的座位？"}, {"speaker": "Li Wei", "en": "Window, please. I love watching the clouds.", "zh": "靠窗的，谢谢。我喜欢看云。"}, {"speaker": "Emma", "en": "Got it. How about row 18? It’s near the front.", "zh": "好的。第18排怎么样？靠近前部。"}, {"speaker": "Li Wei", "en": "That sounds good. Is there extra legroom?", "zh": "听起来不错。腿部空间大吗？"}, {"speaker": "Emma", "en": "Not in economy, but you can pay for an exit row if you want more space.", "zh": "经济舱没有，但如果您想多点空间，可以付费选紧急出口排。"}, {"speaker": "Li Wei", "en": "No thanks, 18A is fine. What’s the gate number?", "zh": "不用了，18A就行。登机口是几号？"}, {"speaker": "Emma", "en": "Gate B12. Boarding starts at 10:45. Here’s your boarding pass.", "zh": "B12登机口。10:45开始登机。这是您的登机牌。"}, {"speaker": "Li Wei", "en": "Thank you so much! Have a nice day!", "zh": "非常感谢！祝您今天愉快！"}, {"speaker": "Emma", "en": "You’re welcome! Safe travels!", "zh": "不客气！旅途平安！"}], "vocabulary": [{"en": "checked baggage", "zh": "托运行李", "example": "Please make sure your checked baggage has a tag."}, {"en": "weigh", "zh": "称重", "example": "They will weigh your bag at the counter."}, {"en": "window seat", "zh": "靠窗座位", "example": "I prefer a window seat to look outside."}, {"en": "aisle seat", "zh": "靠过道座位", "example": "An aisle seat lets you get up easily."}, {"en": "extra legroom", "zh": "额外腿部空间", "example": "Some seats offer extra legroom for comfort."}, {"en": "exit row", "zh": "紧急出口排", "example": "The exit row has more space but requires you to assist if needed."}, {"en": "boarding pass", "zh": "登机牌", "example": "Don’t forget your boarding pass before you go to the gate."}, {"en": "gate number", "zh": "登机口号", "example": "Check the screen for your gate number."}], "tips": ["注意 'checked baggage' 和 'carry-on' 的区别：前者需托运，后者可随身携带。", "口语中常用 'How about...?' 来提建议，比 'Would you like...?' 更随意自然。", "‘Exit row’ 座位虽宽敞，但可能要求乘客协助紧急情况，购票前请确认规则。"]}, {"category": "旅行", "topic": "酒店入住:办理入住 + 请求升级", "title": "前台升房记", "scene": "一位中国游客抵达酒店，想办理入住并尝试申请免费升级房间。", "characters": [{"name": "Linda", "role": "酒店前台接待员"}, {"name": "Mr. Chen", "role": "中国游客"}], "dialogue": [{"speaker": "Linda", "en": "Good afternoon! Welcome to Grandview Hotel. May I have your name, please?", "zh": "下午好！欢迎光临观景酒店。请问您的姓名是？"}, {"speaker": "Mr. Chen", "en": "Hi, I’m Chen Wei. I booked a standard room for two nights.", "zh": "你好，我叫陈伟。我预订了一间标准房，住两晚。"}, {"speaker": "Linda", "en": "Let me check... Yes, Mr. Chen, you’re all set. Could I see your ID and credit card, please?", "zh": "我查一下……好的，陈先生，您已预订成功。请出示您的身份证和信用卡。"}, {"speaker": "Mr. Chen", "en": "Sure, here you go. By the way, is there any chance of upgrading to a deluxe room?", "zh": "当然，给你。顺便问一下，有没有可能升级到豪华房？"}, {"speaker": "Linda", "en": "Hmm, let me see what we have available today. We do have one deluxe room left.", "zh": "嗯，我看看今天有什么空房。我们还剩一间豪华房。"}, {"speaker": "Mr. Chen", "en": "That’s great! Is it possible to get it at no extra cost? I’m celebrating my anniversary.", "zh": "太好了！能不能免费升级？我在庆祝结婚纪念日。"}, {"speaker": "Linda", "en": "Oh, happy anniversary! Let me check with my manager — sometimes we can make exceptions.", "zh": "哦，祝你们周年快乐！我问问经理——有时我们可以破例。"}, {"speaker": "Mr. Chen", "en": "Thank you so much! That would be amazing.", "zh": "太感谢了！那真是太棒了。"}, {"speaker": "Linda", "en": "You’re welcome! I’ll be right back — just need to confirm with the manager.", "zh": "不客气！我马上回来——需要跟经理确认一下。"}, {"speaker": "Linda", "en": "Good news! The manager approved your upgrade — free of charge, as a gift for your anniversary.", "zh": "好消息！经理批准了你的升级——免费的，作为你们纪念日的礼物。"}, {"speaker": "Mr. Chen", "en": "Wow, really? You guys are awesome! Thank you again!", "zh": "哇，真的吗？你们太棒了！再谢谢你们！"}, {"speaker": "Linda", "en": "Our pleasure! Here’s your key card. Room 805, corner suite with city view.", "zh": "不客气！这是您的房卡。805房，角落套房，带城市景观。"}, {"speaker": "Mr. Chen", "en": "Perfect! Do you have any recommendations for dinner nearby?", "zh": "完美！附近有推荐的晚餐餐厅吗？"}, {"speaker": "Linda", "en": "Absolutely! There’s a great local noodle place just five minutes away — very authentic.", "zh": "当然有！步行五分钟就有一家很棒的本地面馆——非常地道。"}, {"speaker": "Mr. Chen", "en": "Sounds delicious! I’ll definitely check it out. Thanks again for everything!", "zh": "听起来很棒！我一定去试试。再次感谢你们的一切帮助！"}, {"speaker": "Linda", "en": "Enjoy your stay, Mr. Chen — and happy anniversary once more!", "zh": "祝您入住愉快，陈先生——再次祝你们周年快乐！"}], "vocabulary": [{"en": "upgrade", "zh": "升级", "example": "Can I upgrade to a bigger room?"}, {"en": "check in", "zh": "办理入住", "example": "I’m here to check in for my reservation."}, {"en": "deluxe room", "zh": "豪华房", "example": "The deluxe room has a balcony and better views."}, {"en": "free of charge", "zh": "免费", "example": "This upgrade is free of charge for you."}, {"en": "confirm", "zh": "确认", "example": "Let me confirm with the manager first."}, {"en": "corner suite", "zh": "角落套房", "example": "We upgraded you to a corner suite with more space."}, {"en": "recommendation", "zh": "推荐", "example": "Do you have any restaurant recommendations?"}, {"en": "authentic", "zh": "地道的", "example": "This restaurant serves authentic local dishes."}], "tips": ["在英语中，'Could I...' 比 'Can I...' 更礼貌，适合请求服务时使用。", "说‘happy anniversary’时，通常用于夫妻或情侣，表示祝贺，不要随意用于朋友。", "注意‘upgrade’发音为 /ˈʌpɡreɪd/，重音在第一个音节，避免读成‘up-grade’。"]}, {"category": "旅行", "topic": "问路:在街头问陌生人指路", "title": "街头问路实录", "scene": "游客在陌生城市街头向路人询问去地铁站的路线。", "characters": [{"name": "Emma", "role": "外国游客"}, {"name": "李明", "role": "本地路人"}], "dialogue": [{"speaker": "Emma", "en": "Excuse me, could you help me? I’m trying to find the nearest subway station.", "zh": "不好意思，能帮我一下吗？我在找最近的地铁站。"}, {"speaker": "李明", "en": "Sure! It’s just two blocks down this street, on your left.", "zh": "当然可以！沿着这条街走两个街区，左边就是。"}, {"speaker": "Emma", "en": "Two blocks? Is that far? I’m not very familiar with this area.", "zh": "两个街区？远吗？我对这里不太熟。"}, {"speaker": "李明", "en": "Not at all — it’s a quick five-minute walk. You’ll see a big red sign.", "zh": "不远，走路五分钟就到。你会看到一个大红招牌。"}, {"speaker": "Emma", "en": "Great! Is there a bus stop nearby too? Just in case I get tired.", "zh": "太好了！附近有公交站吗？万一我走累了。"}, {"speaker": "李明", "en": "Yeah, there’s one right across the street — look for the blue shelter.", "zh": "有，在马路对面，找蓝色的候车亭就行。"}, {"speaker": "Emma", "en": "Perfect. Do you know if the subway runs late at night?", "zh": "太棒了。你知道地铁晚上运营到多晚吗？"}, {"speaker": "李明", "en": "Usually until midnight, but check the schedule online — sometimes it changes.", "zh": "一般到午夜，但最好上网查一下时间表，有时会调整。"}, {"speaker": "Emma", "en": "Got it. And is it easy to buy tickets? I don’t speak Chinese well.", "zh": "明白了。买票方便吗？我中文说得不太好。"}, {"speaker": "李明", "en": "No problem — most machines have English options. Or you can use a mobile payment app.", "zh": "没问题，大多数机器都有英文界面。或者用手机支付App也行。"}, {"speaker": "Emma", "en": "That’s a relief! Thanks so much — you’ve been really helpful.", "zh": "那我就放心了！太感谢你了，你帮了大忙。"}, {"speaker": "李明", "en": "You’re welcome! If you get lost again, just ask anyone — we’re used to helping tourists.", "zh": "不客气！要是再迷路，随便问人都行，我们常帮游客。"}, {"speaker": "Emma", "en": "I’ll remember that. One last thing — is there a good café near the station?", "zh": "我会记住的。最后问一下，地铁站附近有不错的咖啡馆吗？"}, {"speaker": "李明", "en": "Yes! There’s a cozy one called ‘Bean & Brew’ — great coffee and free Wi-Fi.", "zh": "有！叫‘豆与酿’，环境舒服，咖啡好喝，还有免费Wi-Fi。"}, {"speaker": "Emma", "en": "Awesome! I’ll definitely check it out. Thanks again!", "zh": "太棒了！我一定去试试。再次谢谢你！"}, {"speaker": "李明", "en": "Have a great day! Safe travels!", "zh": "祝你今天愉快！一路平安！"}], "vocabulary": [{"en": "subway station", "zh": "地铁站", "example": "The subway station is just around the corner."}, {"en": "block", "zh": "街区", "example": "It’s only three blocks from here."}, {"en": "familiar with", "zh": "熟悉...", "example": "I’m not familiar with this neighborhood."}, {"en": "run late", "zh": "运营到很晚", "example": "Does the train run late on weekends?"}, {"en": "mobile payment", "zh": "移动支付", "example": "You can pay with mobile payment at most shops."}, {"en": "cozy", "zh": "舒适的", "example": "This café is so cozy and quiet."}, {"en": "free Wi-Fi", "zh": "免费Wi-Fi", "example": "Most cafes offer free Wi-Fi for customers."}, {"en": "safe travels", "zh": "一路平安", "example": "Safe travels — hope you enjoy your trip!"}], "tips": ["英语中常用 'Could you...?' 或 'Do you know...?' 来礼貌地提问，比直接说 'Tell me...' 更自然。", "在中国，路人通常乐于助人，尤其对游客，即使语言不通也会尽力帮忙，别怕开口。", "注意 'subway' 和 'metro' 可指地铁，但在美国多用 subway，欧洲多用 metro，语境中都可理解。"]}, {"category": "旅行", "topic": "景点买票:购票 + 询问导览", "title": "买票问导游", "scene": "游客在景区售票处买票并询问导览服务。", "characters": [{"name": "Lily", "role": "中国游客"}, {"name": "Tom", "role": "景区售票员"}], "dialogue": [{"speaker": "Lily", "en": "Hi, I’d like to buy two tickets for today, please.", "zh": "你好，我想买两张今天的票。"}, {"speaker": "Tom", "en": "Sure! That’ll be 120 yuan total. Cash or card?", "zh": "好的！一共120元，现金还是刷卡？"}, {"speaker": "Lily", "en": "Card, please. Do you have audio guides here?", "zh": "刷卡。你们有语音导览吗？"}, {"speaker": "Tom", "en": "Yes, we do. They’re 20 yuan each and include headphones.", "zh": "有的，每台20元，包含耳机。"}, {"speaker": "Lily", "en": "Great! I’ll take two of those too.", "zh": "太好了！我也要两个。"}, {"speaker": "Tom", "en": "Perfect. Your total is 160 yuan now.", "zh": "好的，现在总共是160元。"}, {"speaker": "Lily", "en": "Can I ask — is there a guided tour in English?", "zh": "我能问一下——有英文讲解团吗？"}, {"speaker": "Tom", "en": "Yes, we have one at 3 PM. It lasts about an hour.", "zh": "有，下午三点有一场，大约一小时。"}, {"speaker": "Lily", "en": "That works! Is it included in the ticket price?", "zh": "太好了！这个包含在票价里吗？"}, {"speaker": "Tom", "en": "No, it’s an extra 30 yuan per person, but worth it!", "zh": "不包含，每人额外30元，但很值！"}, {"speaker": "Lily", "en": "Okay, I’ll join that one. How many people are usually on it?", "zh": "好的，我参加那个。通常有多少人？"}, {"speaker": "Tom", "en": "Usually around 15-20. You can sign up at the info desk.", "zh": "一般15到20人左右。你可以在咨询台报名。"}, {"speaker": "Lily", "en": "Got it. Thanks so much! One last thing — where’s the entrance?", "zh": "明白了，谢谢！最后问一下——入口在哪？"}, {"speaker": "Tom", "en": "Just follow the path past the gift shop — you can’t miss it.", "zh": "沿着礼品店那边的小路走，不会错的。"}, {"speaker": "Lily", "en": "Awesome! Have a great day, Tom.", "zh": "太棒了！祝你今天愉快，Tom。"}, {"speaker": "Tom", "en": "You too! Enjoy your visit!", "zh": "你也是！玩得开心！"}], "vocabulary": [{"en": "ticket", "zh": "票", "example": "I need two tickets for the museum."}, {"en": "audio guide", "zh": "语音导览", "example": "The audio guide explains all the exhibits."}, {"en": "guided tour", "zh": "讲解团", "example": "We joined the guided tour at 2 PM."}, {"en": "sign up", "zh": "报名", "example": "You can sign up for the tour at the front desk."}, {"en": "entrance", "zh": "入口", "example": "The entrance is on the left side of the building."}, {"en": "extra charge", "zh": "额外费用", "example": "There’s an extra charge for the special exhibit."}, {"en": "info desk", "zh": "咨询台", "example": "Ask at the info desk if you get lost."}, {"en": "follow the path", "zh": "沿着小路走", "example": "Just follow the path to find the garden."}], "tips": ["注意 'extra charge' 和 'included' 的搭配：门票是否含导览需用 'Is it included?' 或 'Is there an extra charge?'", "口语中常用 'got it' 表示‘明白了’，比 'I understand' 更自然随意。", "发音提示：'guide' 发音为 /ɡaɪd/，不是 /ɡuːd/；'tour' 发音为 /tʊr/，不要读成 'tower'。"]}, {"category": "旅行", "topic": "租车:取车 + 检查车况", "title": "取车验车记", "scene": "游客在租车公司取车，与工作人员一起检查车辆状况。", "characters": [{"name": "Linda", "role": "租车公司员工"}, {"name": "Tom", "role": "中国游客，租车顾客"}], "dialogue": [{"speaker": "Linda", "en": "Hi there! Are you Tom? I’ve got your rental car ready.", "zh": "嗨！你是汤姆吗？你的租车已经准备好了。"}, {"speaker": "Tom", "en": "Yes, that’s me. Can we check the car before I sign anything?", "zh": "对，是我。签合同前能先检查一下车吗？"}, {"speaker": "Linda", "en": "Of course! Let’s walk around and do a quick inspection together.", "zh": "当然可以！我们绕车走一圈，快速检查一下。"}, {"speaker": "Tom", "en": "Great. First, let me check if all the lights are working.", "zh": "太好了。我先看看所有灯是不是都正常。"}, {"speaker": "Linda", "en": "Good idea. Try turning on the headlights and brake lights.", "zh": "好主意。试试打开前灯和刹车灯。"}, {"speaker": "Tom", "en": "Looks good. What about the tires? Any damage or low pressure?", "zh": "看起来没问题。轮胎呢？有破损或气压不足吗？"}, {"speaker": "Linda", "en": "Nope, all tires are fine. We just checked them yesterday.", "zh": "没有，轮胎都很好，我们昨天刚检查过。"}, {"speaker": "Tom", "en": "Okay. Can I open the hood and check the oil level?", "zh": "好的。我能打开引擎盖看看机油量吗？"}, {"speaker": "Linda", "en": "Sure, go ahead. The dipstick is right here.", "zh": "当然，你来吧。油尺就在这儿。"}, {"speaker": "Tom", "en": "Perfect. Oil looks good. What’s this button for?", "zh": "完美。机油没问题。这个按钮是干什么的？"}, {"speaker": "Linda", "en": "That’s the trunk release. Press it to open the back compartment.", "zh": "那是后备箱开关，按一下就能打开后厢。"}, {"speaker": "Tom", "en": "Got it. One last thing — any scratches or dents I should note?", "zh": "明白了。最后问一下——有没有划痕或凹痕需要我记录？"}, {"speaker": "Linda", "en": "Actually, yes — there’s a small scratch near the rear bumper.", "zh": "其实有——后保险杠附近有个小划痕。"}, {"speaker": "Tom", "en": "Can you show me where exactly? I’ll take a photo for my records.", "zh": "你能指给我看具体位置吗？我会拍张照留底。"}, {"speaker": "Linda", "en": "Right here. And don’t worry — it’s already noted in the system.", "zh": "就在这里。别担心，系统里已经记录了。"}, {"speaker": "Tom", "en": "Thanks, Linda. Everything looks good. I’m ready to sign now.", "zh": "谢谢琳达。一切都没问题，我现在可以签字了。"}, {"speaker": "Linda", "en": "Awesome! Here’s your key and rental agreement. Drive safe!", "zh": "太棒了！这是你的钥匙和租赁协议，祝你一路平安！"}], "vocabulary": [{"en": "rental car", "zh": "租用车", "example": "I picked up my rental car at the airport."}, {"en": "inspection", "zh": "检查", "example": "We did a quick inspection before driving off."}, {"en": "headlights", "zh": "前大灯", "example": "Make sure your headlights work at night."}, {"en": "tire pressure", "zh": "胎压", "example": "Check the tire pressure before a long trip."}, {"en": "hood", "zh": "引擎盖", "example": "Open the hood to check the engine oil."}, {"en": "dipstick", "zh": "油尺", "example": "Use the dipstick to see how much oil is left."}, {"en": "trunk release", "zh": "后备箱开关", "example": "Press the trunk release to open the storage space."}, {"en": "scratch", "zh": "划痕", "example": "There’s a small scratch on the passenger door."}], "tips": ["英语中常用‘Let’s...’开头表示建议或邀请，如‘Let’s check the car.’（咱们检查一下车吧）。", "注意‘rental car’和‘car rental’的区别：前者是名词短语，后者是服务名称，如‘I booked a car rental.’", "发音提示：‘dipstick’中的‘dip’读作/dɪp/，不要发成/diːp/；‘trunk’在美国英语中指后备箱，英国人说‘boot’。"]}, {"category": "社交", "topic": "约会:第一次见面聊天", "title": "咖啡馆初遇", "scene": "两人在咖啡馆第一次见面，轻松聊天破冰。", "characters": [{"name": "Emma", "role": "女方，开朗爱笑"}, {"name": "Leo", "role": "男方，有点紧张但真诚"}], "dialogue": [{"speaker": "Emma", "en": "Hi Leo! You’re early — that’s sweet.", "zh": "嗨Leo！你来得真早——真贴心。"}, {"speaker": "Leo", "en": "Hey Emma! I didn’t want to keep you waiting.", "zh": "嘿Emma！我不想让你等太久。"}, {"speaker": "Emma", "en": "Don’t worry, I just got here too. So… what do you like to do on weekends?", "zh": "别担心，我也刚到。那……你周末喜欢做什么？"}, {"speaker": "Leo", "en": "I usually go hiking or watch movies. How about you?", "zh": "我通常去徒步或者看电影。你呢？"}, {"speaker": "Emma", "en": "Same! I love nature walks and cozy movie nights.", "zh": "一样！我喜欢自然散步和温馨的电影之夜。"}, {"speaker": "Leo", "en": "That sounds perfect. Maybe we can go hiking together sometime?", "zh": "听起来很棒。也许我们可以找个时间一起去徒步？"}, {"speaker": "Emma", "en": "I’d love that! Any favorite trail around here?", "zh": "我很乐意！这附近有你喜欢的步道吗？"}, {"speaker": "Leo", "en": "There’s a great one near the lake — not too steep, good views.", "zh": "湖边有一条很棒的步道——不太陡，风景很好。"}, {"speaker": "Emma", "en": "Nice! I’m all for easy hikes with nice scenery.", "zh": "太棒了！我喜欢轻松又有美景的徒步。"}, {"speaker": "Leo", "en": "Me too. Oh, your coffee looks amazing — what did you order?", "zh": "我也是。哦，你的咖啡看起来超棒——你点的什么？"}, {"speaker": "Emma", "en": "It’s a caramel latte. Super sweet — I have a serious sugar addiction!", "zh": "是焦糖拿铁。超级甜——我对糖上瘾了！"}, {"speaker": "Leo", "en": "Haha, same here. I always get the chocolate chip muffin with my coffee.", "zh": "哈哈，我也是。我总是配咖啡点巧克力松饼。"}, {"speaker": "Emma", "en": "You’re speaking my language now. We should share next time!", "zh": "你现在说中我心坎了。下次我们该一起分享！"}, {"speaker": "Leo", "en": "Deal! And hey, thanks for meeting me today — I was kinda nervous.", "zh": "成交！还有，谢谢你今天来见我——我其实有点紧张。"}, {"speaker": "Emma", "en": "No need to be nervous — I’m really glad we met. Let’s do this again soon!", "zh": "不用紧张——我真的很高兴我们能见面。我们很快再约吧！"}, {"speaker": "Leo", "en": "Absolutely. Text me anytime — I’ll be looking forward to it!", "zh": "当然！随时给我发消息——我会很期待的！"}], "vocabulary": [{"en": "keep someone waiting", "zh": "让某人等待", "example": "I didn’t want to keep you waiting."}, {"en": "cozy movie night", "zh": "温馨的电影之夜", "example": "I love cozy movie nights with popcorn."}, {"en": "hiking trail", "zh": "徒步小径", "example": "The trail near the lake is perfect for beginners."}, {"en": "scenery", "zh": "风景", "example": "The mountain has beautiful scenery in autumn."}, {"en": "sugar addiction", "zh": "糖瘾", "example": "She admits she has a sugar addiction."}, {"en": "chocolate chip muffin", "zh": "巧克力松饼", "example": "I always grab a chocolate chip muffin with my coffee."}, {"en": "speaking my language", "zh": "说到我心坎里", "example": "When you mentioned pizza, you were speaking my language!"}, {"en": "deal", "zh": "成交", "example": "Let’s meet Saturday — deal?"}], "tips": ["英语中‘keep someone waiting’比直译‘make someone wait’更地道，常用于表达礼貌。", "‘speaking my language’是习语，表示‘说到我心坎里/完全符合我的喜好’，不是字面意思。", "注意连读：比如‘I didn’t want to’可轻读为 /aɪ ˈdɪdnt wɑːntə/，让口语更自然流畅。"]}, {"category": "社交", "topic": "朋友聚会:叙旧 + 近况", "title": "老友重聚话近况", "scene": "两个多年未见的朋友在咖啡馆偶遇，边喝咖啡边聊各自生活变化。", "characters": [{"name": "Lily", "role": "刚从国外回来的设计师"}, {"name": "Tom", "role": "本地工作的软件工程师"}], "dialogue": [{"speaker": "Lily", "en": "Hey Tom! Wow, I can’t believe it’s been three years!", "zh": "嘿，汤姆！天哪，真不敢相信我们已经三年没见了！"}, {"speaker": "Tom", "en": "Lily! You look amazing. Did you just come back from abroad?", "zh": "莉莉！你看起来气色真好。你刚从国外回来吗？"}, {"speaker": "Lily", "en": "Yeah, I got back last month. Still adjusting to the time zone, honestly.", "zh": "是啊，上个月刚回来。说实话，时差还没完全倒过来呢。"}, {"speaker": "Tom", "en": "I remember you were working in London. How was it?", "zh": "我记得你在伦敦工作，那边怎么样？"}, {"speaker": "Lily", "en": "It was fun at first, but after a while, I missed home cooking and my family.", "zh": "刚开始挺有趣，但过了一阵子，我就开始想念家里的饭菜和家人了。"}, {"speaker": "Tom", "en": "Totally get that. So what are you up to now? Back to design?", "zh": "完全理解。那你现在做什么？又做设计了吗？"}, {"speaker": "Lily", "en": "Yep, freelancing for a few local brands. It’s flexible, which I love.", "zh": "对，给几个本地品牌做自由设计。时间灵活，我很喜欢。"}, {"speaker": "Tom", "en": "That sounds awesome. I’m still stuck in my office job, but hey, it pays the bills.", "zh": "听起来很棒啊。我还在办公室上班，不过嘛，至少能养活自己。"}, {"speaker": "Lily", "en": "Don’t sell yourself short! You’re good at what you do.", "zh": "别贬低自己！你做的工作很棒。"}, {"speaker": "Tom", "en": "Thanks, that means a lot. Hey, have you seen Sarah lately? She moved back too.", "zh": "谢谢，这话对我很重要。对了，你最近见过莎拉吗？她也搬回来了。"}, {"speaker": "Lily", "en": "No way! I haven’t heard from her since graduation. We should meet up!", "zh": "不会吧！我毕业后再也没她的消息了。我们该约她一起聚聚！"}, {"speaker": "Tom", "en": "Definitely. Let’s plan something next weekend? My treat this time.", "zh": "当然！下周末安排一下？这次我请客。"}, {"speaker": "Lily", "en": "You’re on! I’ll bring some snacks. And maybe we can go for a walk after?", "zh": "一言为定！我带点零食。之后还能一起去散步？"}, {"speaker": "Tom", "en": "Perfect. I’ve been meaning to check out that new park downtown.", "zh": "太好了。我一直想看看市中心那个新公园。"}, {"speaker": "Lily", "en": "Me too! Let’s make it happen. Can’t wait to catch up properly!", "zh": "我也是！一定要去。真期待好好聊聊！"}, {"speaker": "Tom", "en": "Same here. It’s been way too long. Let’s not wait another three years!", "zh": "我也是，太久没见了。别再等三年啦！"}], "vocabulary": [{"en": "adjusting to", "zh": "适应", "example": "I’m still adjusting to the weather here."}, {"en": "freelancing", "zh": "自由职业", "example": "She’s freelancing as a graphic designer."}, {"en": "sell yourself short", "zh": "低估自己", "example": "Don’t sell yourself short — you did great!"}, {"en": "catch up", "zh": "叙旧", "example": "Let’s grab coffee and catch up soon."}, {"en": "my treat", "zh": "我请客", "example": "This round is my treat!"}, {"en": "on (as in 'you're on')", "zh": "同意；成交", "example": "You’re on — let’s meet at 7."}, {"en": "check out", "zh": "去看看", "example": "We should check out that new café."}, {"en": "way too long", "zh": "太久", "example": "It’s been way too long since we last met."}], "tips": ["‘Catch up’ 是朋友见面常用短语，表示‘聊聊近况’，不是字面‘追上’的意思。", "‘My treat’ 表示‘我请客’，口语中比 ‘I’ll pay’ 更自然、更亲切。", "‘You’re on!’ 是同意约定的口语表达，语气轻松，适合朋友间使用。"]}, {"category": "社交", "topic": "道歉:迟到后向朋友道歉", "title": "迟到道歉对话", "scene": "朋友约在咖啡馆见面，一人因堵车迟到，见面后真诚道歉。", "characters": [{"name": "Lily", "role": "迟到的朋友"}, {"name": "Tom", "role": "等待的朋友"}], "dialogue": [{"speaker": "Lily", "en": "Hey Tom, I’m so sorry I’m late!", "zh": "嘿汤姆，对不起我迟到了！"}, {"speaker": "Tom", "en": "No worries, I just got here myself.", "zh": "别担心，我也刚到。"}, {"speaker": "Lily", "en": "Really? You’re too kind. The traffic was a nightmare.", "zh": "真的吗？你太好了。交通简直糟透了。"}, {"speaker": "Tom", "en": "I know, it’s been crazy all day. Did you eat yet?", "zh": "我知道，今天一整天都特别堵。你吃了吗？"}, {"speaker": "Lily", "en": "Not yet. I was rushing and forgot to grab breakfast.", "zh": "还没，我赶时间，忘了吃早饭。"}, {"speaker": "Tom", "en": "Let’s order something then. My treat for making you wait.", "zh": "那我们点些吃的吧。我请客，因为你等我。"}, {"speaker": "Lily", "en": "You don’t have to do that! But thanks, I’d love some coffee.", "zh": "你不用这样！不过谢谢，我想要杯咖啡。"}, {"speaker": "Tom", "en": "It’s fine, seriously. I’m just glad you made it.", "zh": "没事的，真的。我只高兴你终于到了。"}, {"speaker": "Lily", "en": "I feel bad though — I hate being late.", "zh": "但我还是觉得过意不去——我讨厌迟到。"}, {"speaker": "Tom", "en": "Don’t stress about it. Stuff happens, right?", "zh": "别太在意啦，事情总会发生的，对吧？"}, {"speaker": "Lily", "en": "Yeah, but I should’ve texted you earlier.", "zh": "是啊，但我应该早点给你发短信的。"}, {"speaker": "Tom", "en": "Next time, just send a quick ‘running late’ message.", "zh": "下次，就发个‘要迟到了’的简短消息就行。"}, {"speaker": "Lily", "en": "Deal. And I’ll set two alarms from now on.", "zh": "成交。而且我以后会设两个闹钟。"}, {"speaker": "Tom", "en": "Good plan. Now let’s get those coffees before they run out!", "zh": "好主意。现在赶紧去点咖啡，别卖光了！"}, {"speaker": "Lily", "en": "Lead the way — I owe you one!", "zh": "带路吧——我欠你一个人情！"}, {"speaker": "Tom", "en": "You’re welcome. Let’s enjoy the rest of our time.", "zh": "不客气。让我们好好享受剩下的时光吧。"}], "vocabulary": [{"en": "sorry", "zh": "抱歉", "example": "I’m sorry I forgot your birthday."}, {"en": "traffic", "zh": "交通", "example": "The traffic was terrible this morning."}, {"en": "rush", "zh": "匆忙", "example": "I had to rush to catch the bus."}, {"en": "treat", "zh": "请客", "example": "I’ll treat you to dinner tonight."}, {"en": "stress", "zh": "压力/紧张", "example": "Don’t stress over small things."}, {"en": "text", "zh": "发短信", "example": "Text me when you get home."}, {"en": "alarm", "zh": "闹钟", "example": "My alarm didn’t go off this morning."}, {"en": "owe", "zh": "欠人情", "example": "I owe you for helping me move."}], "tips": ["英语中‘I’m sorry’可以用于轻微错误，不必过度正式；中文‘对不起’语气更重。", "‘My treat’是口语中表示‘我请客’的常用表达，比‘I will pay’更自然。", "‘Don’t stress’是B1级别常用口语，相当于‘别紧张/别担心’，发音时注意连读：/dɑːnt stre s/"]}, {"category": "社交", "topic": "拒绝:礼貌拒绝朋友的请求", "title": "婉拒朋友邀约", "scene": "朋友邀请你周末帮忙搬家，但你已有安排，需礼貌拒绝。", "characters": [{"name": "Lily", "role": "请求帮助的朋友"}, {"name": "Tom", "role": "需要婉拒的朋友"}], "dialogue": [{"speaker": "Lily", "en": "Hey Tom, are you free this Saturday? I need help moving some furniture.", "zh": "嘿，汤姆，这周六你有空吗？我需要帮忙搬些家具。"}, {"speaker": "Tom", "en": "Oh, I’d love to help, but I already have plans that day.", "zh": "哦，我很想帮忙，但我那天已经有安排了。"}, {"speaker": "Lily", "en": "Really? What are you up to?", "zh": "真的吗？你有什么事？"}, {"speaker": "Tom", "en": "I’m visiting my cousin who’s in town for the weekend. We haven’t seen each other in ages.", "zh": "我要去看望一个从外地来的表亲，我们好久没见面了。"}, {"speaker": "Lily", "en": "Ah, that’s sweet. Family first, I get it.", "zh": "啊，真好。家人优先，我懂的。"}, {"speaker": "Tom", "en": "Thanks for understanding. Maybe I can help next weekend if you’re still stuck?", "zh": "谢谢你理解。如果下周末你还需要帮忙，我可以来？"}, {"speaker": "Lily", "en": "That would be awesome! Let me check my schedule and text you.", "zh": "那太好了！我查一下日程再发信息给你。"}, {"speaker": "Tom", "en": "Perfect. And hey, if you need someone to recommend a moving company, I know a good one.", "zh": "完美。对了，如果你需要推荐搬家公司，我认识一家不错的。"}, {"speaker": "Lily", "en": "Oh, that’s super helpful! Thanks, Tom!", "zh": "哦，那太有用了！谢谢你，汤姆！"}, {"speaker": "Tom", "en": "No problem at all. Let me know how it goes!", "zh": "别客气，随时告诉我进展！"}, {"speaker": "Lily", "en": "Will do! And sorry for asking last minute.", "zh": "一定！抱歉这么临时才问你。"}, {"speaker": "Tom", "en": "Don’t worry about it. Life happens!", "zh": "别担心，生活就是这样嘛！"}, {"speaker": "Lily", "en": "You’re the best, Tom. Really appreciate it.", "zh": "你真是最好的，汤姆。真的很感激。"}, {"speaker": "Tom", "en": "Anytime — except Saturdays, apparently!", "zh": "随时欢迎——除了周六，显然不行！"}, {"speaker": "Lily", "en": "Haha, noted! Talk soon.", "zh": "哈哈，记住了！回头聊。"}, {"speaker": "Tom", "en": "Talk soon! Take care.", "zh": "回头聊！保重。"}], "vocabulary": [{"en": "have plans", "zh": "有安排", "example": "I can’t go out tonight—I have plans."}, {"en": "family first", "zh": "家人优先", "example": "Sorry I missed your party—family first!"}, {"en": "still stuck", "zh": "仍然卡住/需要帮助", "example": "If you’re still stuck with homework, call me."}, {"en": "last minute", "zh": "临时", "example": "She canceled our dinner last minute."}, {"en": "life happens", "zh": "生活总是这样", "example": "Don’t stress—it’s okay, life happens."}, {"en": "recommend", "zh": "推荐", "example": "Can you recommend a good restaurant?"}, {"en": "super helpful", "zh": "非常有用", "example": "Your notes were super helpful for the test."}, {"en": "take care", "zh": "保重", "example": "Take care on your trip!"}], "tips": ["英语中常用 'I’d love to, but…' 来委婉拒绝，既表达意愿又说明原因。", "‘Life happens’ 是地道口语，表示事情无法预料，语气轻松自然。", "结尾用 ‘Take care’ 比 ‘Goodbye’ 更温暖亲切，适合朋友间告别。"]}, {"category": "社交", "topic": "搭讪:在咖啡馆认识新朋友", "title": "咖啡馆初识", "scene": "在一家安静的咖啡馆，两人因座位相邻而开始交谈。", "characters": [{"name": "Lily", "role": "本地女孩，喜欢咖啡和阅读"}, {"name": "Tom", "role": "刚来城市的游客，想找人聊天"}], "dialogue": [{"speaker": "Tom", "en": "Hi, mind if I sit here? All the other seats are taken.", "zh": "嗨，介意我坐这儿吗？其他座位都满了。"}, {"speaker": "Lily", "en": "Not at all! Go ahead. It’s a busy afternoon.", "zh": "不介意！请坐吧。今天下午挺忙的。"}, {"speaker": "Tom", "en": "Thanks! I’m Tom, by the way. Just visiting the city for a few days.", "zh": "谢谢！对了，我叫汤姆，来这城市玩几天。"}, {"speaker": "Lily", "en": "Nice to meet you, Tom. I’m Lily. I come here every weekend.", "zh": "很高兴认识你，汤姆。我是莉莉，我每个周末都来这儿。"}, {"speaker": "Tom", "en": "Oh, so you’re a regular? What’s your favorite drink here?", "zh": "哦，所以你是常客？你最喜欢点什么饮料？"}, {"speaker": "Lily", "en": "I always get the caramel latte. It’s sweet but not too heavy.", "zh": "我总点焦糖拿铁，甜但不会太腻。"}, {"speaker": "Tom", "en": "Sounds good! I’ll try that next time. Do you read here often?", "zh": "听起来不错！下次我也试试。你常在这儿看书吗？"}, {"speaker": "Lily", "en": "Yeah, it’s quiet and cozy. Perfect for reading or working.", "zh": "是啊，这里安静又舒服，很适合看书或工作。"}, {"speaker": "Tom", "en": "Totally agree. I’ve been looking for a place like this since I arrived.", "zh": "完全同意。我一到这儿就在找这样的地方。"}, {"speaker": "Lily", "en": "You should check out the bookstore next door. Great selection!", "zh": "你应该去隔壁书店看看，选书很棒！"}, {"speaker": "Tom", "en": "Really? I’ll definitely go after this. Thanks for the tip!", "zh": "真的吗？喝完这杯我就去。谢谢推荐！"}, {"speaker": "Lily", "en": "No problem! If you need more recommendations, just ask.", "zh": "不客气！如果你还需要推荐，随时问我。"}, {"speaker": "Tom", "en": "That’d be awesome. Maybe we can grab coffee again sometime?", "zh": "那太好了。也许我们可以再一起喝杯咖啡？"}, {"speaker": "Lily", "en": "Sure! Here’s my number. Text me when you’re free.", "zh": "当然！这是我的号码，有空发短信给我。"}, {"speaker": "Tom", "en": "Perfect. Looking forward to it! Enjoy your latte, Lily.", "zh": "太棒了。期待下次见面！享受你的拿铁吧，莉莉。"}, {"speaker": "Lily", "en": "You too, Tom. See you around!", "zh": "你也是，汤姆。回头见！"}], "vocabulary": [{"en": "mind if I...?", "zh": "介意我……吗？", "example": "Mind if I join you?"}, {"en": "regular", "zh": "常客", "example": "She’s a regular at this café."}, {"en": "cozy", "zh": "舒适的", "example": "This corner is really cozy."}, {"en": "selection", "zh": "选择", "example": "They have a great selection of teas."}, {"en": "grab coffee", "zh": "喝杯咖啡", "example": "Let’s grab coffee this weekend."}, {"en": "recommendation", "zh": "推荐", "example": "Do you have any restaurant recommendations?"}, {"en": "text me", "zh": "给我发短信", "example": "Text me when you arrive."}, {"en": "see you around", "zh": "回头见", "example": "See you around, take care!"}], "tips": ["‘Mind if I…?’ 是非常自然的搭讪开场白，语气礼貌且不突兀。", "英语中 ‘grab coffee’ 不只是喝咖啡，常指轻松见面聊天，类似中文‘喝个咖啡聊聊天’。", "‘See you around’ 是非正式告别语，比 ‘Goodbye’ 更随意亲切，适合朋友间使用。"]}];

const app = document.getElementById('app');
const controls = document.getElementById('controls');
const headerSub = document.getElementById('header-sub');
let state = { view: 'home', category: null, scenarioIdx: -1, showZh: true, rate: 0.9 };

// Progress: mastered vocab and studied scenarios
const progress = JSON.parse(localStorage.getItem('speaky_progress') || '{"mastered":{},"studied":[]}');
function saveProgress() { localStorage.setItem('speaky_progress', JSON.stringify(progress)); }

function render() {
  if (state.view === 'home') renderHome();
  else if (state.view === 'category') renderCategory(state.category);
  else if (state.view === 'scenario') renderScenario(state.category, state.scenarioIdx);
  window.scrollTo(0, 0);
}

function renderHome() {
  controls.style.display = 'none';
  headerSub.textContent = `${DATA.length} 段情景剧 · 离线学习`;
  const cats = {};
  DATA.forEach((s, i) => {
    if (!cats[s.category]) cats[s.category] = [];
    cats[s.category].push({ ...s, _idx: i });
  });
  let html = '';
  const catEmojis = { '职场': '💼', '生活': '🏠', '旅行': '✈️', '社交': '💬' };
  for (const cat of Object.keys(cats)) {
    html += `<div class="cat-header">${catEmojis[cat]||''} ${cat}</div>`;
    cats[cat].forEach(s => {
      const studied = progress.studied.includes(s._idx);
      html += `<div class="card" onclick="goCategory('${cat}')">
        <h3>${s.topic}</h3>
        <div class="meta">${s.title} · ${s.dialogue ? s.dialogue.length : 0} 轮 · ${studied ? '<span style="color:#34c759">已学</span>' : '未学'}</div>
      </div>`;
    });
  }
  app.innerHTML = html;
}

function renderCategory(cat) {
  controls.style.display = 'none';
  const list = DATA.map((s, i) => ({...s, _idx: i})).filter(s => s.category === cat);
  headerSub.textContent = `${cat} · ${list.length} 段`;
  let html = `<button class="back" onclick="goHome()">← 返回首页</button>
    <div class="cat-header">${cat}</div>`;
  list.forEach(s => {
    const studied = progress.studied.includes(s._idx);
    html += `<div class="card" onclick="goScenario('${cat}', ${s._idx})">
      <h3>${s.topic}</h3>
      <div class="meta">${s.title} · ${s.dialogue ? s.dialogue.length : 0} 轮 · ${studied ? '<span style="color:#34c759">已学</span>' : '未学'}</div>
    </div>`;
  });
  app.innerHTML = html;
}

function renderScenario(cat, idx) {
  const s = DATA[idx];
  if (!s || s.category !== cat) { app.innerHTML = '<div class="empty">未找到</div>'; return; }
  controls.style.display = 'inline-flex';
  headerSub.textContent = s.topic;
  if (!progress.studied.includes(idx)) { progress.studied.push(idx); saveProgress(); }

  let html = `<button class="back" onclick="goCategory('${cat}')">← 返回${cat}</button>`;
  html += `<div class="scene-info">
    <div class="title">${s.title}</div>
    <div class="scene">${s.scene || ''}</div>
    <div class="chars">${(s.characters||[]).map(c => `<span><b>${c.name}</b> ${c.role}</span>`).join('')}</div>
  </div>`;

  html += `<div class="dialogue">`;
  (s.dialogue || []).forEach((t, i) => {
    html += `<div class="turn">
      <div class="speaker">${t.speaker}</div>
      <div class="en" onclick="speak(${i})" data-i="${i}">${escapeHtml(t.en)}</div>
      ${state.showZh ? `<div class="zh">${escapeHtml(t.zh)}</div>` : ''}
      <div class="play">▶ 点击播放</div>
    </div>`;
  });
  html += `</div>`;

  // Vocabulary
  if (s.vocabulary && s.vocabulary.length) {
    html += `<div class="vocab-section"><h3>📝 重点词汇 (${s.vocabulary.length})</h3>`;
    s.vocabulary.forEach((v, i) => {
      const key = `${idx}_v_${i}`;
      const mastered = progress.mastered[key];
      html += `<div class="vocab-card">
        <div class="word">${escapeHtml(v.en)} ${mastered ? '<span class="mastered-badge">✓ 已掌握</span>' : ''}</div>
        <div class="meaning">${escapeHtml(v.zh)}</div>
        <div class="example" onclick="speakText(this.dataset.text)" data-text="${escapeAttr(v.example)}">"${escapeHtml(v.example)}"</div>
        <button class="back" onclick="toggleMaster('${key}', this)">${mastered ? '取消掌握' : '标记已掌握'}</button>
      </div>`;
    });
    html += `</div>`;
  }

  // Tips
  if (s.tips && s.tips.length) {
    html += `<div class="tips"><h3>💡 学习要点</h3><ul>`;
    s.tips.forEach(t => { html += `<li>${escapeHtml(t)}</li>`; });
    html += `</ul></div>`;
  }

  app.innerHTML = html;
}

// TTS
let utter;
function speakText(text) {
  if (!('speechSynthesis' in window)) { alert('浏览器不支持语音'); return; }
  speechSynthesis.cancel();
  utter = new SpeechSynthesisUtterance(text);
  utter.lang = 'en-US';
  utter.rate = state.rate;
  const voices = speechSynthesis.getVoices().filter(v => v.lang.startsWith('en'));
  if (voices.length) utter.voice = voices[0];
  speechSynthesis.speak(utter);
}
function speak(i) {
  const s = DATA[state.scenarioIdx];
  if (s && s.dialogue && s.dialogue[i]) speakText(s.dialogue[i].en);
}

let playAllIdx = -1;
let playAllTimer = null;
function playAll() {
  const s = DATA[state.scenarioIdx];
  if (!s || !s.dialogue) return;
  if (playAllIdx >= 0) { // stop
    speechSynthesis.cancel();
    clearTimeout(playAllTimer);
    playAllIdx = -1;
    document.getElementById('play-all').textContent = '▶ 全文播放';
    return;
  }
  playAllIdx = 0;
  document.getElementById('play-all').textContent = '⏹ 停止';
  const step = () => {
    if (playAllIdx >= s.dialogue.length) {
      playAllIdx = -1;
      document.getElementById('play-all').textContent = '▶ 全文播放';
      return;
    }
    speakText(s.dialogue[playAllIdx].en);
    playAllIdx++;
    playAllTimer = setTimeout(step, (s.dialogue[playAllIdx-1].en.length * 80) + 500);
  };
  step();
}

function toggleMaster(key, btn) {
  if (progress.mastered[key]) delete progress.mastered[key];
  else progress.mastered[key] = true;
  saveProgress();
  render();
}

function escapeHtml(s) { return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escapeAttr(s) { return (s||'').replace(/"/g, '&quot;'); }

// Navigation
window.goHome = () => { state = {...state, view: 'home'}; render(); };
window.goCategory = (cat) => { state = {...state, view: 'category', category: cat}; render(); };
window.goScenario = (cat, idx) => { state = {...state, view: 'scenario', category: cat, scenarioIdx: idx}; render(); };
window.speak = speak;
window.speakText = speakText;
window.toggleMaster = toggleMaster;

// Controls
document.getElementById('rate').addEventListener('input', e => {
  state.rate = parseFloat(e.target.value);
  document.getElementById('rate-val').textContent = state.rate + 'x';
});
document.getElementById('play-all').addEventListener('click', playAll);
document.getElementById('toggle-zh').addEventListener('click', e => {
  state.showZh = !state.showZh;
  e.target.textContent = state.showZh ? '隐藏中文' : '显示中文';
  e.target.classList.toggle('active', !state.showZh);
  render();
});

// Init voices (Chrome loads async)
if ('speechSynthesis' in window) speechSynthesis.onvoiceschanged = () => {};

render();
</script>
</body>
</html>
