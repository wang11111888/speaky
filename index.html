<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>英语学习</title>
<style>
* { box-sizing: border-box; }
body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif;
       background: #f5f5f7; color: #1d1d1f; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
h1 { font-size: 28px; margin: 0 0 8px; }
.sub { color: #888; font-size: 14px; margin-bottom: 32px; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 16px; max-width: 700px; width: 100%; }
.card { background: #fff; border-radius: 16px; padding: 24px; text-decoration: none; color: inherit; box-shadow: 0 2px 8px rgba(0,0,0,.08); transition: transform .15s, box-shadow .15s; display: block; }
.card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,.12); }
.card .emoji { font-size: 40px; }
.card h2 { font-size: 18px; margin: 12px 0 6px; }
.card .desc { font-size: 13px; color: #666; line-height: 1.5; }
.card .meta { font-size: 11px; color: #999; margin-top: 10px; }
</style>
</head>
<body>
<h1>📖 英语学习</h1>
<div class="sub">手机点击下方卡片进入 · 可添加到主屏幕</div>
<div class="cards">
  <a class="card" href="phonics.html">
    <div class="emoji">🔤</div>
    <h2>小学英语拼读</h2>
    <div class="desc">48 个音标 + 自然拼读 + 60 个分级单词 + 64 句主题句</div>
    <div class="meta">点击发音 · 拼读拆分 · 适合小学全阶段</div>
  </a>
  <a class="card" href="口语情景剧.html">
    <div class="emoji">🗣️</div>
    <h2>口语情景剧</h2>
    <div class="desc">20 段中英对照情景对话,职场/生活/旅行/社交</div>
    <div class="meta">逐句朗读 · 词汇卡 · 学习要点</div>
  </a>
</div>
</body>
</html>
